//www.w3.org/1999/xhtml"><strong>G ≡ C</strong>（<strong>3个氢键</strong>，更稳定）   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.9" class="markmap-node" transform="translate(797, -184.375)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="157" y1="21.6875" y2="21.6875"/><circle stroke-width="1.5" r="6" stroke="#17becf" fill="var(--markmap-circle-open-bg)" cx="155" cy="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="139" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★碱基互补配对：   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.12" class="markmap-node" transform="translate(797, -138.59375)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="445" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="427" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">骨架：脱氧核糖+磷酸在<strong>外侧</strong>（亲水），碱基在<strong>内侧</strong>（疏水）   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.13" class="markmap-node" transform="translate(797, -111.21875)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="189" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="171" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">表面：形成<strong>大沟</strong>和<strong>小沟</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.14" class="markmap-node" transform="translate(797, -83.84375)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="205" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="187" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">碱基对平面与螺旋轴<strong>垂直</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.15" class="markmap-node" transform="translate(797, -56.46875)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="391" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="373" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">稳定力量：<strong>氢键</strong>(横向) + <strong>碱基堆积力/疏水作用</strong>(纵向)   </div></div></foreignObject></g><g data-depth="2" data-path="1.6" class="markmap-node" transform="translate(335, -143.40625)"><line stroke="#e377c2" stroke-width="1.75" x1="-1" x2="384" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#e377c2" fill="var(--markmap-circle-open-bg)" cx="382" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="366" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★二级结构——双螺旋模型（Watson-Crick, 1953）   </div></div></foreignObject></g><g data-depth="3" data-path="1.16.17" class="markmap-node" transform="translate(616, -24.09375)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="154" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="136" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>[A]=[T]，[G]=[C]</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.16.18" class="markmap-node" transform="translate(616, 3.28125)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="365" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="347" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">不同物种碱基组成不同；同一个体不同组织相同   </div></div></foreignObject></g><g data-depth="2" data-path="1.16" class="markmap-node" transform="translate(335, -10.40625)"><line stroke="#8c564b" stroke-width="1.75" x1="-1" x2="203" y1="21.875" y2="21.875"/><circle stroke-width="1.5"