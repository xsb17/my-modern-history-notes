3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">DNA双螺旋多样性   </div></div></foreignObject></g><g data-depth="3" data-path="1.23.24" class="markmap-node" transform="translate(522, 122.78125)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="291" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="273" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">原核：<strong>超螺旋</strong>（多为<strong>负超螺旋</strong>/环状）   </div></div></foreignObject></g><g data-depth="4" data-path="1.23.25.26" class="markmap-node" transform="translate(869, 155.15625)"><line stroke="#9467bd" stroke-width="1.1875" x1="-1" x2="477" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="459" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">核心：组蛋白<strong>八聚体</strong>（H2A/H2B/H3/H4各2分子）+ DNA~146bp   </div></div></foreignObject></g><g data-depth="4" data-path="1.23.25.27" class="markmap-node" transform="translate(869, 182.34375)"><line stroke="#8c564b" stroke-width="1.1875" x1="-1" x2="242" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="224" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">连接：<strong>H1</strong>组蛋白 + ~60bp DNA   </div></div></foreignObject></g><g data-depth="4" data-path="1.23.25.28" class="markmap-node" transform="translate(869, 209.53125)"><line stroke="#e377c2" stroke-width="1.1875" x1="-1" x2="299" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="281" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">分裂期压缩<strong>8000~10000倍</strong>形成染色体   </div></div></foreignObject></g><g data-depth="3" data-path="1.23.25" class="markmap-node" transform="translate(522, 182.34375)"><li