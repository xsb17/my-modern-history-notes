a-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(667, -209.4609375)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="542" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="524" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定量：A₂₆₀=1.0 ≈ <strong>50μg/ml</strong>双链DNA | <strong>40μg/ml</strong> RNA | <strong>20μg/ml</strong>寡核苷酸   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.5" class="markmap-node" transform="translate(667, -182.0859375)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="456" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="438" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">纯度判断：纯DNA -&gt; <strong>A₂₆₀/A₂₈₀=1.8</strong> | 纯RNA -&gt; <strong>A₂₆₀/A₂₈₀=2.0</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.6" class="markmap-node" transform="translate(667, -154.7109375)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="291" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="273" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">对比蛋白质：蛋白质吸收峰在<strong>280nm</strong>   </div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(416, -195.7734375)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="173" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="171" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="155" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★核酸紫外吸收特性   </div></div></foreignObject></g><g data-depth="3" data-path="1.7.8" class="markmap-node" transform="translate(729, -122.3359375)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="432" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="414" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：理化因素 -&gt; <strong>氢键+碱基堆积力断裂</strong> -&gt; 双链解为单链   </div></div></foreignObject></g><g data-depth="3" data-path="1.7.9" class="markmap-node" transform="translate(729, -94.9609375)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="384" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="366" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">变性因素：<strong>加热</strong>（最常用）/强酸强碱/尿素/甲酰胺   </div></div></foreignObject></g><g data-depth="3" data-path="1.7.10" class="markmap-node" transform="translate(729, -67.5859375)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="499" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="481" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">本质：<strong>次级键断裂</strong>/空间结构改变，<strong>一级结构不变</strong>（不涉及共价键）   </div></div></foreignObject></g><g data-depth="3" data-path="1.7.11" class="markmap-node" transform="translate(729, -40.2109375)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="252" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="234" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">区别于降解：降解 = <strong>共价键断裂</strong>   </div></div></foreignObject></g><g data-depth="4" data-path="1.7.12.13" class="markmap-node" transform="translate(964, -7.8359375)"><line stroke="#e377c2" stroke-width="1.1875" x1="-1" x2="414" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="396" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>增色效应</strong>：260nm紫外吸收<strong>升高</strong>（解链暴露更多碱基）   </div></div></foreignObject></g><g data-depth="4" data-path="1.7.12.14" class="markmap-node" transform="translate(964, 19.3515625)"><line stroke="#7f7f7f" stroke-width="1.1875" x1="-1" x2="125" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="107" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">溶液粘度<strong>降低</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.7.12" class="markmap-node" transform="translate(729, 5.7578125)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="157" y1="21.6875" y2="21.6875"/><circle stroke-width="1.5" r="6" stroke="#8c564b" fill="var(--markmap-circle-open-bg)" cx="155" cy="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="139" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★两大标志现象：   </div></div></foreignObject></g><g data-depth="4" data-path="1.7.15.16" class="markmap-node" transform="translate(1049, 51.5390625)"><line stroke="#17becf" stroke-width="1.1875" x1="-1" x2="349" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="331" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：紫外吸收增加值达最大值<strong>一半</strong>时的温度   </div></div></foreignObject></g><g data-depth="4" data-path="1.7.15.17" class="markmap-node" transform="translate(1049, 78.7265625)"><line stroke="#1f77b4" stroke-width="1.1875" x1="-1" x2="441" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="423" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">Tm与<strong>G-C含量</strong>正相关（G≡C三个氢键更稳定 -&gt; 需更高