 data-path="1.2.5" class="markmap-node" transform="translate(679, -168.83203125)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="591" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="573" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">前体：<strong>hnRNA</strong>（核内不均一RNA）-&gt; 含内含子/外显子 -&gt; 剪切加工 -&gt; 成熟mRNA   </div></div></foreignObject></g><g data-depth="5" data-path="1.2.6.7.8" class="markmap-node" transform="translate(1548, -136.45703125)"><line stroke="#bcbd22" stroke-width="1.09375" x1="-1" x2="441" y1="21.546875" y2="21.546875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="423" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">功能：维持mRNA<strong>稳定</strong> + 协助<strong>核输出</strong> + <strong>翻译起始</strong>识别核糖体   </div></div></foreignObject></g><g data-depth="4" data-path="1.2.6.7" class="markmap-node" transform="translate(1023, -136.45703125)"><line stroke="#7f7f7f" stroke-width="1.1875" x1="-1" x2="447" y1="21.59375" y2="21.59375"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="445" cy="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="429" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">① <strong>5'端帽子结构</strong>：<strong>m⁷GpppN</strong>（7-甲基鸟嘌呤-三磷酸核苷）   </div></div></foreignObject></g><g data-depth="5" data-path="1.2.6.9.10" class="markmap-node" transform="translate(1378, -104.26953125)"><line stroke="#1f77b4" stroke-width="1.09375" x1="-1" x2="385" y1="21.546875" y2="21.546875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="367" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">功能：与poly(A)结合蛋白结合 -&gt; 维持mRNA<strong>稳定性</strong>   </div></div></foreignObject></g><g data-depth="4" data-path="1.2.6.9" class="markmap-node" transform="translate(1023, -104.26953125)"><line stroke="#17becf" stroke-width="1.1875" x1="-1" x2="277" y1="21.59375" y2="21.59375"/><circle stroke-width="1.5" r="6" stroke="#17becf" fill="var(--markmap-circle-open-bg)" cx="275" cy="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="259" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">② <strong>3'端Poly-A尾</strong>：20~250个腺苷酸   </div></div></foreignObject></g><g data-depth="4" data-path="1.2.6.11" class="markmap-node" transform="translate(1023, -72.17578125)"><line stroke="#ff7f0e" stroke-width="1.1875" x1="-1" x2="476" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="458" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">③ 编码区：从AUG起始 -&gt; 每三联体密码编码一个AA -&gt; <strong>单顺反子</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.6" class="markmap-node" transform="translate(679, -104.31640625)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="266" y1="21.6875" y2="21.6875"/><circle stroke-width="1.5" r="6" stroke="#e377c2" fill="var(--markmap-circle-open-bg)" cx="264" cy="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="248" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★真核成熟mRNA三大结构特征：   </div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(417, -163.94921875)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="184" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="182" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="166" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★mRNA（信使RNA）   </div></div></foreignObject></g><g data-depth="3" data-path="1.12.13" class="markmap-node" transform="translate(686, -39.98828125)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="278" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="260" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">含量：细胞内<strong>最多</strong>的RNA（&gt;<strong>80%</strong>）   </div></div></foreignObject></g><g data-depth="3" data-path="1.12.14" class="markmap-node" transform="translate(686, -12.61328125)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="342" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="324" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">存在形式：<strong>核糖体</strong> = 60% rRNA + 40% 蛋白质   </div></div></foreignObject></g><g data-depth="3" data-path="1.12.15" class="markmap-node" transform="translate(686, 14.76171875)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="269" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="251" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">功能：核糖体是<strong>蛋白质合成的场所</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.12.16" class="markmap-node" transform="translate(686, 42.13671875)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="510" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="492" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">原核核糖体：<strong>70S</strong> = 30S小亚基(16S rRNA) + 50S大亚基(23S/5S rRNA)   </div></div></foreignObject></g><g data-depth="3" data-path="1.12.17" class="markmap-node" transform="translate(686, 69.51171875)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="547" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="529" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">真核核糖体：<strong>80S</strong> = 40S小亚基(18S rRNA) + 60S大亚基(28S/5.8S/5S rRNA)   </div></div></foreignObject></g><g data-depth="3" data-path="1.12.18" class="markmap-node" transform="translate(686, 96.88671875)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="290" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="272" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">结构：单链回折 -&gt; 局部螺旋区和突环   </div></div></foreignObject></g><g data-depth="2" data-path="1.12" class="markmap-node" transform="translate(417, 28.44921875)"><line stroke="#2ca02c" stroke-width="1.75" x1="-1" x2="191" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#2ca02c" fill="var(--markmap-circle-open-bg)" cx="189" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="173" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★rRNA（核糖体RNA）   </div></div></foreignObject></g><g data-depth="3" data-path="1.19.20" class="markmap-node" transform="translate(662, 129.26171875)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="307" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="289" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">mRNA：<strong>最少</strong>(1~5%)/模板/5'帽+3'polyA   </div></div></foreignObject></g><g data-depth="3" data-path="1.19.21" class="markmap-node" transform="translate(662, 156.63671875)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="352" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="334" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">rRNA：<strong>最多</strong>(&gt;80%)/核糖体组分/蛋白合成场所   </div></div></foreignObject></g><g data-depth="2" data-path="1.19" class="markmap-node" transform="translate(417, 142.94921875)"><line stroke="#bcbd22" stroke-width="1.75" x1="-1" x2="167" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#bcbd22" fill="var(--markmap-circle-open-bg)" cx="165" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="149" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">mRNA vs rRNA 对比   </div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10.5)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="339" y1="22.25" y2="22.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="337" cy="22.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="321" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">mRNA与rRNA的结构与功能 — 微型速记导图   </div></div></foreignObject></g></g></svg>