line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="492" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="474" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：理化因素 -&gt; <strong>空间构象被破坏</strong> -&gt; 理化性质改变 + <strong>生物活性丧失</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(725, -262.15625)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="459" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="441" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">本质：<strong>空间结构</strong>（非共价键+二硫键）被破坏，<strong>一级结构未改变</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.2.5" class="markmap-node" transform="translate(725, -234.78125)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="443" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="425" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">变性因素：<strong>加热/有机溶剂/强酸强碱/重金属离子/生物碱试剂</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.2.6" class="markmap-node" transform="translate(725, -207.40625)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="539" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="521" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">变性结果：溶解度↓/粘度↑/结晶能力消失/生物活性丧失/<strong>易被蛋白酶水解</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.2.7" class="markmap-node" transform="translate(725, -180.03125)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="524" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="506" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">临床：70~75%酒精消毒(变性细菌蛋白)/高温灭菌/低温保存疫苗(防变性)</div></div></foreignObject></g><g data-depth="3" data-path="1.2.8" class="markmap-node" transform="translate(725, -152.65625)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="428" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="410" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>复性</strong>：变性程度轻 -&gt; 去除变性因素 -&gt; <strong>恢复原有构象和功能</strong></div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(405, -221.09375)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="242" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="240" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="224" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★蛋白质变性（必考核心概念）</div></div></foreignObject></g><g data-depth="3" data-path="1.9.10" class="markmap-node" transform="translate(597, -120.28125)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="416" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="398" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：蛋白表面<strong>电荷+水化膜被破坏</strong> -&gt; 蛋白分子聚集析出</div></div></foreignObject></g><g data-depth="4" data-path="1.9.11.12" class="markmap-node" transform="translate(773, -87.90625)"><line stroke="#e377c2" stroke-width="1.1875" x1="-1" x2="421" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="403" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">盐析法：高浓度盐(<strong>硫酸铵/NaCl</strong>) -&gt; 破坏水化层+中和电荷</div></div></foreignObject></g><g data-depth="4" data-path="1.9.11.13" class="markmap-node" transform="translate(773, -60.71875)"><line stroke="#7f7f7f" stroke-width="1.1875" x1="-1" x2="207" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="189" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">有机溶剂：乙醇/甲醇/丙酮</div></div></foreignObject></g><g data-depth="4" data-path="1.9.11.14" class="markmap-node" transform="translate(773, -33.53125)"><line stroke="#bcbd22" stroke-width="1.1875" x1="-1" x2="223" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="205" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">酸类：苦味酸/钨酸/<strong>三氯乙酸</strong></div></div></foreignObject></g><g data-depth="4" data-path="1.9.11.15" class="markmap-node" transform="translate(773, -6.34375)"><line stroke="#17becf" stroke-width="1.1875" x1="-1" x2="473" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="455" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">重金属：Pb²⁺/Hg²⁺/Ag⁺（pI&lt;pH时蛋白带负电 -&gt; 与重金属结合）</div></div></foreignObject></g><g data-depth="3" data-path="1.9.11" class="markmap-node" transform="translate(597, -47.125)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="98" y1="21.6875" y2="21.6875"/><circle stroke-width="1.5" r="6" stroke="#8c564b" fill="var(--markmap-circle-open-bg)" cx="96" cy="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="80" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">沉淀因素：</div></div></foreignObject></g><g data-depth="2" data-path="1.9" class="markmap-node" transform="translate(405, -83.703125)"><line stroke="#d62728" stroke-width="1.75" x1="-1" x2="114" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#d62728" fill="var(--markmap-circle-open-bg)" cx="112" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="96" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★蛋白质沉淀</div></div></foreignObject></g><g data-depth="3" data-path="1.16.17" class="markmap-node" transform="translate(597, 25.84375)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="521" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="503" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：变性蛋白 -&gt; 调pH至pI -&gt; 絮状物 -&gt; <strong>再加热</strong> -&gt; 坚固凝块（不可逆）</div></div></foreignObject></g><g data-depth="3" data-path="1.16.18" class="markmap-node" transform="translate(597, 53.21875)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="242" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="224" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">凝固 = 变性的进一步<strong>不可逆</strong>发展</div></div></foreignObject></g><g data-depth="2" data-path="1.16" class="markmap-node" transform="translate(405, 39.53125)"><line stroke="#8c564b" stroke-width="1.75" x1="-1" x2="114" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#8c564b" fill="var(--markmap-circle-open-bg)" cx="112" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="96" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★蛋白质凝固</div></div></foreignObject></g><g data-depth="3" data-path="1.19.20" class="markmap-node" transform="translate(818, 85.59375)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="247" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="229" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">变性 -&gt; <strong>不一定</strong>沉淀，<strong>不一定</strong>凝固</div></div></foreignObject></g><g data-depth="3" data-path="1.19.21" class="markmap-node" transform="translate(818, 112.96875)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="359" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="341" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">沉淀 -&gt; <strong>不一定</strong>变性（如盐析沉淀蛋白可不变性）</div></div></foreignObject></g><g data-depth="3" data-path="1.19.22" class="markmap-node" transform="translate(818, 140.34375)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="183" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="165" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">凝固 -&gt; <strong>一定</strong>发生了变性</div></div></foreignObject></g><g data-depth="2" data-path="1.19" class="markmap-node" transform="translate(405, 112.96875)"><line stroke="#bcbd22" stroke-width="1.75" x1="-1" x2="335" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#bcbd22" fill="var(--markmap-circle-open-bg)" cx="333" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="317" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★变性/沉淀/凝固三者辩证关系（必考选择）</div></div></foreignObject></g><g data-depth="3" data-path="1.23.24" class="markmap-node" transform="translate(533, 172.71875)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="222" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="204" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">变性 = 空构毁/一级在/活性丧</div></div></foreignObject></g><g data-depth="3" data-path="1.23.25" class="markmap-node" transform="translate(533, 200.09375)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="222" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="204" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">沉淀 = 电荷消/水化破/析出来</div></div></foreignObject></g><g data-depth="3" data-path="1.23.26" class="markmap-node" transform="translate(533, 227.46875)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="202" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="184" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">凝固 = 变性+加热 = 不可逆</div></div></foreignObject></g><g data-depth="2" data-path="1.23" class="markmap-node" transform="translate(405, 200.09375)"><line stroke="#2ca02c" stroke-width="1.75" x1="-1" x2="50" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#2ca02c" fill="var(--markmap-circle-open-bg)" cx="48" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="32" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">口诀</div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10.5)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="327" y1="22.25" y2="22.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="325" cy="22.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="309" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">蛋白质的变性、沉淀与凝固 — 微型速记导图</div></div></foreignObject></g></g></svg>