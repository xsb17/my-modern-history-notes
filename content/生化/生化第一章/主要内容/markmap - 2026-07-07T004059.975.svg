" data-path="1.2" class="markmap-node" transform="translate(357, -245.6875)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="130" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="128" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="112" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">蛋白质元素组成</div></div></foreignObject></g><g data-depth="2" data-path="1.4" class="markmap-node" transform="translate(357, -213.3125)"><line stroke="#d62728" stroke-width="1.75" x1="-1" x2="533" y1="21.875" y2="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="515" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★氨基酸基本结构：<strong>H₂N-CHR-COOH</strong> -&gt; 20种 <strong>L-α-氨基酸</strong>（甘氨酸除外）</div></div></foreignObject></g><g data-depth="3" data-path="1.5.6" class="markmap-node" transform="translate(623, -180.5625)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="676" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="658" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">非极性疏水侧链：<strong>甘(Gly)/丙(Ala)/缬(Val)/亮(Leu)/异亮(Ile)/脯(Pro)/蛋(Met)</strong> -&gt; 侧链为烃链</div></div></foreignObject></g><g data-depth="3" data-path="1.5.7" class="markmap-node" transform="translate(623, -153.1875)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="661" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="643" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">极性中性侧链：<strong>丝(Ser)/半胱(Cys)/苏(Thr)/天冬酰胺(Asn)/谷氨酰胺(Gln)</strong> -&gt; 极性不带电荷</div></div></foreignObject></g><g data-depth="3" data-path="1.5.8" class="markmap-node" transform="translate(623, -125.8125)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="633" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="615" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">芳香族氨基酸：<strong>苯丙(Phe)/色(Trp)/酪(Tyr)</strong> -&gt; 含芳香环 -&gt; <strong>280nm紫外吸收</strong>（Trp/Tyr）</div></div></foreignObject></g><g data-depth="3" data-path="1.5.9" class="markmap-node" transform="translate(623, -98.4375)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="436" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="418" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">酸性氨基酸(R含-COOH)：<strong>天冬(Asp/D)</strong>、<strong>谷(Glu/E)</strong> -&gt; pI≈3</div></div></foreignObject></g><g data-depth="3" data-path="1.5.10" class="markmap-node" transform="translate(623, -71.0625)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="541" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="523" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">碱性氨基酸(R含-NH₂)：<strong>精(Arg/R)</strong>、<strong>赖(Lys/K)</strong>、<strong>组(His/H)</strong> -&gt; pI≈7.6~10.8</div></div></foreignObject></g><g data-depth="2" data-path="1.5" class="markmap-node" transform="translate(357, -125.8125)"><line stroke="#9467bd" stroke-width="1.75" x1="-1" x2="188" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#9467bd" fill="var(--markmap-circle-open-bg)" cx="186" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="170" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★五大分类（按R侧链）</div></div></foreignObject></g><g data-depth="3" data-path="1.11.12" class="markmap-node" transform="translate(581, -38.6875)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="335" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="317" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">亚氨基酸：<strong>脯氨酸(Pro)</strong> -&gt; 可羟化为羟脯氨酸</div></div></foreignObject></g><g data-depth="3" data-path="1.11.13" class="markmap-node" transform="translate(581, -11.3125)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="391" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="373" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">含硫：<strong>半胱(Cys)</strong> + <strong>蛋/甲硫(Met)</strong> -&gt; Cys可形成<strong>二硫键</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.11.14" class="markmap-node" transform="translate(581, 16.0625)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="342" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="324" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">可磷酸化（含-OH）：<strong>丝(Ser)/苏(Thr)/酪(Tyr)</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.11.15" class="markmap-node" transform="translate(581, 43.4375)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="293" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="275" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">含芳香环：<strong>色(Trp)/酪(Tyr)/苯丙(Phe)</strong></div></div></foreignObject></g><g data-depth="2" data-path="1.11" class="markmap-node" transform="translate(357, 2.375)"><line stroke="#1f77b4" stroke-width="1.75" x1="-1" x2="146" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="144" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="128" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★特殊氨基酸必背</div></div></foreignObject></g><g data-depth="3" data-path="1.16.17" class="markmap-node" transform="translate(541, 75.8125)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="215" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="197" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：净电荷为<strong>零</strong>时的pH值</div></div></foreignObject></g><g data-depth="3" data-path="1.16.18" class="markmap-node" transform="translate(541, 103.1875)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="530" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="512" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">口诀：<strong>pI - pH &gt; 0 -&gt; 阳离子</strong>（带正电）；<strong>pI - pH &lt; 0 -&gt; 阴离子</strong>（带负电）</div></div></foreignObject></g><g data-depth="2" data-path="1.16" class="markmap-node" transform="translate(357, 89.5)"><line stroke="#8c564b" stroke-width="1.75" x1="-1" x2="106" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#8c564b" fill="var(--markmap-circle-open-bg)" cx="104" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="88" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★等电点(pI)</div></div></foreignObject></g><g data-depth="3" data-path="1.19.20" class="markmap-node" transform="translate(549, 135.5625)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="431" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="413" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">肽键：α-COOH + α-NH₂ -&gt; 脱水缩合 -&gt; <strong>酰胺键</strong>（-CO-NH-）</div></div></foreignObject></g><g data-depth="3" data-path="1.19.21" class="markmap-node" transform="translate(549, 162.9375)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="305" y1="23.6875" y2="23.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="287" height="23"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">寡肽：2<sub>10AA/多肽：10</sub>50AA/蛋白质：&gt;50AA</div></div></foreignObject></g><g data-depth="3" data-path="1.19.22" class="markmap-node" transform="translate(549, 192.3125)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="270" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="252" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">方向性：<strong>N端→C端</strong>（书写N左C右）</div></div></foreignObject></g><g data-depth="2" data-path="1.19" class="markmap-node" transform="translate(357, 163.9375)"><line stroke="#bcbd22" stroke-width="1.75" x1="-1" x2="114" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#bcbd22" fill="var(--markmap-circle-open-bg)" cx="112" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="96" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★肽键与肽链</div></div></foreignObject></g><g data-depth="3" data-path="1.23.24" class="markmap-node" transform="translate(558, 224.6875)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="467" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="449" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">三肽：谷+半胱+甘 -&gt; 含**-SH** -&gt; <strong>抗氧化</strong>+保护RBC膜+螯合解毒</div></div></foreignObject></g><g data-depth="2" data-path="1.23" class="markmap-node" transform="translate(357, 224.6875)"><line stroke="