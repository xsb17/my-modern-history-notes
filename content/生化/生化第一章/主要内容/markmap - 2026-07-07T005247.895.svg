" data-path="1.2" class="markmap-node" transform="translate(368, -245.6875)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="141" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="139" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="123" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">蛋白质元素组成   </div></div></foreignObject></g><g data-depth="2" data-path="1.4" class="markmap-node" transform="translate(368, -213.3125)"><line stroke="#d62728" stroke-width="1.75" x1="-1" x2="543" y1="21.875" y2="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="525" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★氨基酸基本结构：<strong>H₂N-CHR-COOH</strong> -&gt; 20种 <strong>L-α-氨基酸</strong>（甘氨酸除外）   </div></div></foreignObject></g><g data-depth="3" data-path="1.5.6" class="markmap-node" transform="translate(644, -180.5625)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="687" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="669" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">非极性疏水侧链：<strong>甘(Gly)/丙(Ala)/缬(Val)/亮(Leu)/异亮(Ile)/脯(Pro)/蛋(Met)</strong> -&gt; 侧链为烃链   </div></div></foreignObject></g><g data-depth="3" data-path="1.5.7" class="markmap-node" transform="translate(644, -153.1875)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="671" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="653" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">极性中性侧链：<strong>丝(Ser)/半胱(Cys)/苏(Thr)/天冬酰胺(Asn)/谷氨酰胺(Gln)</strong> -&gt; 极性不带电荷   </div></div></foreignObject></g><g data-depth="3" data-path="1.5.8" class="markmap-node" transform="translate(644, -125.8125)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="644" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="626" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">芳香族氨基酸：<strong>苯丙(Phe)/色(Trp)/酪(Tyr)</strong> -&gt; 含芳香环 -&gt; <strong>280nm紫外吸收</strong>（Trp/Tyr）   </div></div></foreignObject></g><g data-depth="3" data-path="1.5.9" class="markmap-node" transform="translate(644, -98.4375)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="447" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="429" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">酸性氨基酸(R含-COOH)：<strong>天冬(Asp/D)</strong>、<strong>谷(Glu/E)</strong> -&gt; pI≈3   </div></div></foreignObject></g><g data-depth="3" data-path="1.5.10" class="markmap-node" transform="translate(644, -71.0625)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="552" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="534" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">碱性氨基酸(R含-NH₂)：<strong>精(Arg/R)</strong>、<strong>赖(Lys/K)</strong>、<strong>组(His/H)</strong> -&gt; pI≈7.6~10.8   </div></div></foreignObject></g><g data-depth="2" data-path="1.5" class="markmap-node" transform="translate(368, -125.8125)"><line stroke="#9467bd" stroke-width="1.75" x1="-1" x2="198" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#9467bd" fill="var(--markmap-circle-open-bg)" cx="196" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="180" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★五大分类（按R侧链）   </div></div></foreignObject></g><g data-depth="3" data-path="1.11.12" class="markmap-node" transform="translate(603, -38.6875)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="345" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="327" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">亚氨基酸：<strong>脯氨酸(Pro)</strong> -&gt; 可羟化为羟脯氨酸   </div></div></foreignObject></g><g data-depth="3" data-path="1.11.13" class="markmap-node" transform="translate(603, -11.3125)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="401" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="383" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">含硫：<strong>半胱(Cys)</strong> + <strong>蛋/甲硫(Met)</strong> -&gt; Cys可形成<strong>二硫键</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.11.14" class="markmap-node" transform="translate(603, 16.0625)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="353" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="335" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">可磷酸化（含-OH）：<strong>丝(Ser)/苏(Thr)/酪(Tyr)</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.11.15" class="markmap-node" transform="translate(603, 43.4375)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="304" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="286" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">含芳香环：<strong>色(Trp)/酪(Tyr)/苯丙(Phe)</strong>   </div></div></foreignObject></g><g data-depth="2" data-path="1.11" class="markmap-node" transform="translate(368, 2.375)"><line stroke="#1f77b4" stroke-width="1.75" x1="-1" x2="157" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="155" cy="2