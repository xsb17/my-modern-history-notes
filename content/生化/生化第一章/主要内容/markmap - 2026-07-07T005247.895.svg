3.org/1999/xhtml">肽键：α-COOH + α-NH₂ -&gt; 脱水缩合 -&gt; <strong>酰胺键</strong>（-CO-NH-）   </div></div></foreignObject></g><g data-depth="3" data-path="1.19.21" class="markmap-node" transform="translate(571, 162.9375)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="316" y1="23.6875" y2="23.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="298" height="23"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">寡肽：2<sub>10AA/多肽：10</sub>50AA/蛋白质：&gt;50AA   </div></div></foreignObject></g><g data-depth="3" data-path="1.19.22" class="markmap-node" transform="translate(571, 192.3125)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="280" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="262" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">方向性：<strong>N端→C端</strong>（书写N左C右）   </div></div></foreignObject></g><g data-depth="2" data-path="1.19" class="markmap-node" transform="translate(368, 163.9375)"><line stroke="#bcbd22" stroke-width="1.75" x1="-1" x2="125" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#bcbd22" fill="var(--markmap-circle-open-bg)" cx="123" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="107" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★肽键与肽链   </div></div></foreignObject></g><g data-depth="3" data-path="1.23.24" class="markmap-node" transform="translate(580, 224.6875)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="477" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="459" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">三肽：谷+半胱+甘 -&gt; 含**-SH** -&gt; <strong>抗氧化</strong>+保护RBC膜+螯合解毒   </div></div></foreignObject></g><g data-depth="2" data-path="1.23" class="m