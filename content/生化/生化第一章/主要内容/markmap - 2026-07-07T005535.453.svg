ne stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="502" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="484" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：理化因素 -&gt; <strong>空间构象被破坏</strong> -&gt; 理化性质改变 + <strong>生物活性丧失</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(747, -262.15625)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="469" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="451" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">本质：<strong>空间结构</strong>（非共价键+二硫键）被破坏，<strong>一级结构未改变</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.5" class="markmap-node" transform="translate(747, -234.78125)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="453" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="435" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">变性因素：<strong>加热/有机溶剂/强酸强碱/重金属离子/生物碱试剂</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.6" class="markmap-node" transform="translate(747, -207.40625)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="550" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="532" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">变性结果：溶解度↓/粘度↑/结晶能力消失/生物活性丧失/<strong>易被蛋白酶水解</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.7" class="markmap-node" transform="translate(747, -180.03125)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="535" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="517" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">临床：70~75%酒精消毒(变性细菌蛋白)/高温灭菌/低温保存疫苗(防变性)   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.8" class="markmap-node" transform="translate(747, -152.65625)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="439" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="421" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>复性</strong>：变性程度轻 -&gt; 去除变性因素 -&gt; <strong>恢复原有构象和功能</strong>   </div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(416, -221.09375)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="253" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="251" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="235" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★蛋白质变性（必考核心概念）   </div></div></foreignObject></g><g data-depth="3" data-path="1.9.10" class="markmap-node" transform="translate(619, -120.28125)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="427" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="409" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：蛋白表面<strong>电荷+水化膜被破坏</strong> -&gt; 蛋白分子聚集析出   </div></div></foreignObject></g><g data-depth="4" data-path="1.9.11.12" class="markmap-node" transform="translate(806, -87.90625)"><line stroke="#e377c2" stroke-width="1.1875" x1="-1" x2="431" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="413" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">盐析法：高浓度盐(<strong>硫酸铵/NaCl</strong>) -&gt; 破坏水化层+中和电荷   </div></div></foreignObject></g><g data-depth="4" data-path="1.9.11.13" class="markmap-node" transform="translate(806, -60.71875)"><line stroke="#7f7f7f" stroke-width="1.1875" x1="-1" x2="217" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="199" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">有机溶剂：乙醇/甲醇/丙酮   </div></div></foreignObject></g><g data-depth="4" data-path="1.9.11.14" class="markmap-node" transform="translate(806, -33.53125)"><line stroke="#bcbd22" stroke-width="1.1875" x1="-1" x2="233" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="215" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">酸类：苦味酸/钨酸/<strong>三氯乙酸</strong>   </div></div></foreignObject></g><g data-depth="4" data-path="1.9.11.15" class="markmap-node" transform="translate(806, -6.34375)"><line stroke="#17becf" stroke-width="1.1875" x1="-1" x2="484" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="466" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">重金属：Pb²⁺/Hg²⁺/Ag⁺（pI&lt;pH时蛋白带负电 -&gt; 与重金属结合）   </div></div></foreignObject></g><g data-depth="3" data-path="1.9.11" class="markmap-node" transform="translate(619, -47.125)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="109" y1="21.6875" y2="21.6875"/><circle stroke-width="1.5" r="6" stroke="#8c564b" fill="var(--markmap-circle-open-bg)" cx="107" cy="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="91" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">沉淀因素：   </div></div></foreignObject></g><g data-depth="2" data-path="1.9" class="markmap-node" transform="translate(416, -83.703125)"><line stroke="#d62728" stroke-width="1.75" x1="-1" x2="125" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#d62728" fill="var(--markmap-circle-open-bg)" cx="123" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="107" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★蛋白质沉淀   </div></div></foreignObject></g><g data-depth="3" data-path="1.16.17" class="markmap-node" transform="translate(619, 25.84375)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="532" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="514" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：变性蛋白 -&gt; 调pH至pI -&gt; 絮状物 -&gt; <strong>再加热</strong> -&gt; 坚固凝块（不可逆）   </div></div></foreignObject></g><g data-depth="3" data-path="1.16.18" class="markmap-node" transform="translate(619, 53.21875)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="252" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="234" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">凝固 = 变性的进一步<strong>不可逆</strong>发展   </div></div></foreignObject></g><g data-depth="2" data-path="1.16" class="markmap-node" transform="translate(416, 39.53125)"><line stroke="#8c564b" stroke-width="1.75" x1="-1" x2="125" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#8c564b" fill="var(--markmap-circle-open-bg)" cx="123" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="107" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★蛋白质凝固   </div></div></foreignObject></g><g data-depth="3" data-path="1.19.20" class="markmap-node" transform="translate(839, 85.59375)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="258" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="240" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">变性 -&gt; <strong>不一定</strong>沉淀，<strong>不一定</strong>凝固   </div></div></foreignObject></g><g data-depth="3" data-path="1.19.21" class="markmap-node" transform="translate(839, 112.96875)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="370" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="352" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">沉淀 -&gt; <strong>不一定</strong>变性（如盐析沉淀蛋白可不变性）   </div></div></foreignObject></g><g data-depth="3" data-path="1.19.22" class="markmap-node" transform="translate(839, 140.34375)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="194" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="176" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">凝固 -&gt; <strong>一定</strong>发生了变性   </div></div></foreignObject></g><g data-depth="2" data-path="1.19" class="markmap-node" transform="translate(416, 112.96875)"><line stroke="#bcbd22" stroke-width="1.75" x1="-1" x2="345" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#bcbd22" fill="var(--markmap-circle-open-bg)" cx="343" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="327" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★变性/沉淀/凝固三者辩证关系（必考选择）   </div></div></foreignObject></g><g data-depth="3" data-path="1.23.24" class="markmap-node" transform="translate(555, 172.71875)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="233" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="215" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">变性 = 空构毁/一级在/活性丧   </div></div></foreignObject></g><g data-depth="3" data-path="1.23.25" class="markmap-node" transform="translate(555, 200.09375)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="233" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="215" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">沉淀 = 电荷消/水化破/析出来   </div></div></foreignObject></g><g data-depth="3" data-path="1.23.26" class="markmap-node" transform="translate(555, 227.46875)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="212" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="194" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">凝固 = 变性+加热 = 不可逆   </div></div></foreignObject></g><g data-depth="2" data-path="1.23" class="markmap-node" transform="translate(416, 200.09375)"><line stroke="#2ca02c" stroke-width="1.75" x1="-1" x2="61" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#2ca02c" fill="var(--markmap-circle-open-bg)" cx="59" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="43" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">口诀   </div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10.5)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="338" y1="22.25" y2="22.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="336" cy="22.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="320" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">蛋白质的变性、沉淀与凝固 — 微型速记导图   </div></div></foreignObject></g></g></svg>