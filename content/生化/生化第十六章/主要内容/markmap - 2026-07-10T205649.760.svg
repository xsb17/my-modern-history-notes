9/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>第二信使</strong> -&gt; <strong><mark>cAMP</mark></strong>（环腺苷酸）   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.8" class="markmap-node" transform="translate(550, -157.375)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="223" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="205" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>靶激酶</strong> -&gt; <strong><mark>蛋白激酶 A (PKA)</mark></strong>   </div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(280, -225.8125)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="192" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="190" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="174" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>cAMP-PKA 通路全流程</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.9.10" class="markmap-node" transform="translate(502, -125)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="397" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="379" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>结构</strong> -&gt; <strong><mark>2R + 2C</mark></strong>（2 个调节亚基 R + 2 个催化亚基 C）   </div></div></foreignObject></g><g data-depth="3" data-path="1.9.11" class="markmap-node" transform="translate(502, -97.625)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="393" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="375" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">无 cAMP 时 -&gt; R₂C₂ 四聚体 -&gt; C 被 R <strong>抑制</strong>（无活性）   </div></div></foreignObject></g><g data-depth="3" data-path="1.9.12" class="markmap-node" transform="translate(502, -70.25)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="600" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="582" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">cAMP 升高 -&gt; <strong><mark>4 分子 cAMP</mark></strong> 与 R 亚基结合 -&gt; R 亚基解离 -&gt; <strong>C 亚基释放</strong> -&gt; PKA <strong>活化</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.9.13" class="markmap-node" transform="translate(502, -42.875)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="486" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="468" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">PKA 是 <strong><mark>Ser/Thr 蛋白激酶</mark></strong>（磷酸化靶蛋白的丝氨酸/苏氨酸残基）   </div></div></foreignObject></g><g data-depth="2" data-path="1.9" class="markmap-node" transform="translate(280, -83.9375)"><line stroke="#d62728" stroke-width="1.75" x1="-1" x2="144" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#d62728" fill="var(--markmap-circle-open-bg)" cx="142" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="126" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>PKA 的活化机制</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.15" class="markmap-node" transform="translate(694, -10.5)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="320" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="302" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>糖原合酶</strong> -&gt; 磷酸化 → <strong><mark>抑制</mark></strong> → 糖原合成↓   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.16" class="markmap-node" transform="translate(694, 16.875)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="401" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="383" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>糖原磷酸化酶 b 激酶</strong> -&gt; 磷酸化 → <strong><mark>促进</mark></strong> → 糖原分解↑   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.17" class="markmap-node" transform="translate(694, 44.25)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="523" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="505" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>激素敏感脂酶(HSL)</strong> -&gt; 磷酸化 → <strong><mark>促进</mark></strong> → 甘油三酯分解↑（脂肪动员）   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.18" class="markmap-node" transform="translate(694, 71.625)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="413" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="395" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>丙酮酸脱氢酶</strong> -&gt; 磷酸化 → <strong><mark>抑制</mark></strong> → 丙酮酸→乙酰CoA↓   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.19" class="markmap-node" transform="translate(694, 99)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="564" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="546" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>转录因子 CREB</strong> -&gt; 磷酸化 → 与 <strong><mark>CRE</mark></strong> 结合 → 调控基因表达（缓慢持久效应）   </div></div></foreignObject></g><g 