<svg xmlns="http://www.w3.org/2000/svg" class="w-full h-full leading-none markmap mm-gpvzjv-1" style=""><style>.markmap{--markmap-max-width: 9999px;--markmap-a-color: #0097e6;--markmap-a-hover-color: #00a8ff;--markmap-code-bg: #f0f0f0;--markmap-code-color: #555;--markmap-highlight-bg: #ffeaa7;--markmap-table-border: 1px solid currentColor;--markmap-font: 300 16px/20px sans-serif;--markmap-circle-open-bg: #fff;--markmap-text-color: #333;--markmap-highlight-node-bg: #ff02;font:var(--markmap-font);color:var(--markmap-text-color)}.markmap-link{fill:none}.markmap-node&gt;circle{cursor:pointer}.markmap-foreign{display:inline-block}.markmap-foreign p{margin:0}.markmap-foreign a{color:var(--markmap-a-color)}.markmap-foreign a:hover{color:var(--markmap-a-hover-color)}.markmap-foreign code{padding:.25em;font-size:calc(1em - 2px);color:var(--markmap-code-color);background-color:var(--markmap-code-bg);border-radius:2px}.markmap-foreign pre{margin:0}.markmap-foreign pre&gt;code{display:block}.markmap-foreign del{text-decoration:line-through}.markmap-foreign em{font-style:italic}.markmap-foreign strong{font-weight:700}.markmap-foreign mark{background:var(--markmap-highlight-bg)}.markmap-foreign table,.markmap-foreign th,.markmap-foreign td{border-collapse:collapse;border:var(--markmap-table-border)}.markmap-foreign img{display:inline-block}.markmap-foreign svg{fill:currentColor}.markmap-foreign&gt;div{width:var(--markmap-max-width);text-align:left}.markmap-foreign&gt;div&gt;div{display:inline-block}.markmap-highlight rect{fill:var(--markmap-highlight-node-bg)}.markmap-dark .markmap{--markmap-code-bg: #1a1b26;--markmap-code-color: #ddd;--markmap-circle-open-bg: #444;--markmap-text-color: #eee}</style><g transform="translate(16.77984331393978,382.665094594785) scale(0.36270557814838356)"><path class="markmap-link" data-depth="3" data-path="1.2.3" d="M366,-76.75C406,-76.75,406,-105.312,446,-105.312" stroke-width="1.375" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="3" data-path="1.2.4" d="M366,-76.75C406,-76.75,406,-75.937,446,-75.937" stroke-width="1.375" stroke="rgb(140, 86, 75)"/><path class="markmap-link" data-depth="3" data-path="1.2.5" d="M366,-76.75C406,-76.75,406,-48.562,446,-48.562" stroke-width="1.375" stroke="rgb(227, 119, 194)"/><path class="markmap-link" data-depth="3" data-path="1.6.7" d="M334,11.375C374,11.375,374,-16.187,414,-16.187" stroke-width="1.375" stroke="rgb(188, 189, 34)"/><path class="markmap-link" data-depth="3" data-path="1.6.8" d="M334,11.375C374,11.375,374,11.188,414,11.188" stroke-width="1.375" stroke="rgb(23, 190, 207)"/><path class="markmap-link" data-depth="3" data-path="1.6.9" d="M334,11.375C374,11.375,374,38.563,414,38.563" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="3" data-path="1.10.11" d="M334,99.5C374,99.5,374,70.938,414,70.938" stroke-width="1.375" stroke="rgb(44, 160, 44)"/><path class="markmap-link" data-depth="3" data-path="1.10.12" d="M334,99.5C374,99.5,374,100.313,414,100.313" stroke-width="1.375" stroke="rgb(214, 39, 40)"/><path class="markmap-link" data-depth="3" data-path="1.10.13" d="M334,99.5C374,99.5,374,127.688,414,127.688" stroke-width="1.375" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="2" data-path="1.2" d="M195,11.75C235,11.75,235,-76.75,275,-76.75" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.6" d="M195,11.75C235,11.75,235,11.375,275,11.375" stroke-width="1.75" stroke="rgb(127, 127, 127)"/><path class="markmap-link" data-depth="2" data-path="1.10" d="M195,11.75C235,11.75,235,99.5,275,99.5" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><g class="markmap-highlight"/><g data-depth="3" data-path="1.2.3" class="markmap-node" transform="translate(446, -127)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="749" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="731" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：一种感受器通常只对<strong>一种特定形式</strong>的刺激能量<strong>最敏感</strong>，这种形式的刺激称为该感受器的<strong>适宜刺激</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(446, -99.625)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="833" y1="23.6875" y2="23.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="815" height="23"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：视觉感受器→波长<strong>380<sub>760nm**电磁波；听觉感受器→频率**20</sub>20000Hz</strong>声波；痛觉感受器→各种<strong>伤害性</strong>刺激   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.5" class="markmap-node" transform="translate(446, -70.25)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="1419" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1401" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：体现了感受器的<strong>高度特异性</strong>（用较小的刺激能量即可兴奋）；是感觉生理学中理解<strong>感觉编码</strong>和<strong>换能</strong>的前提概念；某一感受器的适宜刺激通过<strong>长期进化</strong>形成，与感受器的结构特性相适应   </div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(275, -98.625)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="93" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="91" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="75" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>适宜刺激</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.7" class="markmap-node" transform="translate(414, -37.875)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="573" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="555" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：眼<strong>尽最大能力调节</strong>时（晶状体最大程度变凸）所能看清物体的<strong>最近距离</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.8" class="markmap-node" transform="translate(414, -10.5)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="1102" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1084" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：10岁约<strong>8.8cm</strong>→20岁<strong>10.4cm</strong>→30岁<strong>12.8cm</strong>→40岁<strong>18.5cm</strong>→50岁<strong>52.6cm</strong>→60岁<strong>83.3cm</strong>→70岁<strong>100cm</strong>；近点反映<strong>晶状体弹性</strong>和<strong>调节能力</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.9" class="markmap-node" transform="translate(414, 16.875)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="1527" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1509" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：随年龄增长→晶状体弹性<strong>逐渐降低</strong>→近点<strong>远移</strong>（调节力下降）；近点<strong>远移</strong>超过一定限度 → <strong>老视</strong>（需凸透镜矫正）；近点是衡量眼<strong>调节功能</strong>的常用指标；儿童近点近/调节力强→老年人近点远/调节力弱   </div></div></foreignObject></g><g data-depth="2" data-path="1.6" class="markmap-node" transform="translate(275, -10.5)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="61" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="59" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="43" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>近点</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.10.11" class="markmap-node" transform="translate(414, 49.25)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="821" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="803" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：对于每一个<strong>特定频率</strong>的声波，都有一个<strong>刚能引起听觉</strong>的<strong>最小声波强度</strong>（最小可听声压），称为该频率的<strong>听阈</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.10.12" class="markmap-node" transform="translate(414, 76.625)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="890" y1="23.6875" y2="23.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="872" height="23"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：人耳最敏感频率范围<strong>1000<sub>3000Hz**（阈值最低）；日常语言频率范围**300</sub>3000Hz</strong>；与最大可听阈之间的范围称为<strong>听域</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.10.13" class="markmap-node" transform="translate(414, 106)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="1631" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1613" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：反映听觉系统对<strong>不同频率声波灵敏度的差异</strong>；听阈曲线呈<strong>U形</strong>→中频（1000~3000Hz）阈值最低（最敏感）；听阈↑→听力下降→临床用于评估<strong>听力损伤</strong>程度（听力图）；年龄增长→高频听阈首先升高→老年性耳聋   </div></div></foreignObject></g><g data-depth="2" data-path="1.10" class="markmap-node" transform="translate(275, 77.625)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="61" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="59" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="43" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>听阈</strong>   </div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10.5)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="197" y1="22.25" y2="22.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="195" cy="22.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="179" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">9.2 课后练习题名词解释   </div></div></foreignObject></g></g></svg>