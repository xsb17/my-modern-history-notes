="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1602" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">з”ҹзҗҶж„Ҹд№ү/зү№еҫҒпјҡеҸҚжҳ еҗ¬и§үзі»з»ҹеҜ№<strong>дёҚеҗҢйў‘зҺҮеЈ°жіўзҒөж•ҸеәҰзҡ„е·®ејӮ</strong>пјӣеҗ¬йҳҲжӣІзәҝе‘Ҳ<strong>UеҪў</strong>вҶ’дёӯйў‘пјҲ1000~3000HzпјүйҳҲеҖјжңҖдҪҺпјҲжңҖж•Ҹж„ҹпјүпјӣеҗ¬йҳҲвҶ‘вҶ’еҗ¬еҠӣдёӢйҷҚвҶ’дёҙеәҠз”ЁдәҺиҜ„дј°<strong>еҗ¬еҠӣжҚҹдјӨ</strong>зЁӢеәҰпјҲеҗ¬еҠӣеӣҫпјүпјӣе№ҙйҫ„еўһй•ҝвҶ’й«ҳйў‘еҗ¬йҳҲйҰ–е…ҲеҚҮй«ҳвҶ’иҖҒе№ҙжҖ§иҖіиҒӢ</div></div></foreignObject></g><g data-depth="2" data-path="1.10" class="markmap-node" transform="translate(265, 77.625)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="50" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="48" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="32" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>еҗ¬йҳҲ</strong></div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10.5)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="187" y1="22.25" y2="22.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="185" cy="22.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="169" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">9.2 иҜҫеҗҺз»ғд№ йўҳеҗҚиҜҚи§ЈйҮҠ</div></div></foreignObject></g></g></svg>