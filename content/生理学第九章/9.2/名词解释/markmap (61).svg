mlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">е®ҡд№үпјҡдёҖз§Қж„ҹеҸ—еҷЁйҖҡеёёеҸӘеҜ№<strong>дёҖз§Қзү№е®ҡеҪўејҸ</strong>зҡ„еҲәжҝҖиғҪйҮҸ<strong>жңҖж•Ҹж„ҹ</strong>пјҢиҝҷз§ҚеҪўејҸзҡ„еҲәжҝҖз§°дёәиҜҘж„ҹеҸ—еҷЁзҡ„<strong>йҖӮе®ңеҲәжҝҖ</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(425, -99.625)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="823" y1="23.6875" y2="23.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="805" height="23"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">жӯЈеёёеҖј/е…¬ејҸпјҡи§Ҷи§үж„ҹеҸ—еҷЁвҶ’жіўй•ҝ<strong>380<sub>760nm**з”өзЈҒжіўпјӣеҗ¬и§үж„ҹеҸ—еҷЁвҶ’йў‘зҺҮ**20</sub>20000Hz</strong>еЈ°жіўпјӣз—ӣи§үж„ҹеҸ—еҷЁвҶ’еҗ„з§Қ<strong>дјӨе®іжҖ§</strong>еҲәжҝҖ</div></div></foreignObject></g><g data-depth="3" data-path="1.2.5" class="markmap-node" transform="translate(425, -70.25)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="1408" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1390" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">з”ҹзҗҶж„Ҹд№ү/зү№еҫҒпјҡдҪ“зҺ°дәҶж„ҹеҸ—еҷЁзҡ„<strong>й«ҳеәҰзү№ејӮжҖ§</strong>пјҲз”Ёиҫғе°Ҹзҡ„еҲәжҝҖиғҪйҮҸеҚіеҸҜе…ҙеҘӢпјүпјӣжҳҜж„ҹи§үз”ҹзҗҶеӯҰдёӯзҗҶи§Ј<strong>ж„ҹи§үзј–з Ғ</strong>е’Ң<strong>жҚўиғҪ</strong>зҡ„еүҚжҸҗжҰӮеҝөпјӣжҹҗдёҖж„ҹеҸ—еҷЁзҡ„йҖӮе®ңеҲәжҝҖйҖҡиҝҮ<strong>й•ҝжңҹиҝӣеҢ–</strong>еҪўжҲҗпјҢдёҺж„ҹеҸ—еҷЁзҡ„з»“жһ„зү№жҖ§зӣёйҖӮеә”</div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(265, -98.625)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="82" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="80" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="64" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>йҖӮе®ңеҲәжҝҖ</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.6.7" class="markmap-node" transform="translate(393, -37.875)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="562" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="544" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">е®ҡд№үпјҡзңј<strong>е°ҪжңҖеӨ§иғҪеҠӣи°ғиҠӮ</strong>ж—¶пјҲжҷ¶зҠ¶дҪ“жңҖеӨ§зЁӢеәҰеҸҳеҮёпјүжүҖиғҪзңӢжё…зү©дҪ“зҡ„<strong>жңҖиҝ‘и·қзҰ»</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.6.8" class="markmap-node" transform="translate(393, -10.5)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="1091" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1073" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">жӯЈеёёеҖј/е…¬ејҸпјҡ10еІҒзәҰ<strong>8.8cm</strong>вҶ’20еІҒ<strong>10.4cm</strong>вҶ’30еІҒ<strong>12.8cm</strong>вҶ’40еІҒ<strong>18.5cm</strong>вҶ’50еІҒ<strong>52.6cm</strong>вҶ’60еІҒ<strong>83.3cm</strong>вҶ’70еІҒ<strong>100cm</strong>пјӣиҝ‘зӮ№еҸҚжҳ <strong>жҷ¶зҠ¶дҪ“еј№жҖ§</strong>е’Ң<strong>и°ғиҠӮиғҪеҠӣ</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.6.9" class="markmap-node" transform="translate(393, 16.875)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="1516" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1498" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">з”ҹзҗҶж„Ҹд№ү/зү№еҫҒпјҡйҡҸе№ҙйҫ„еўһй•ҝвҶ’жҷ¶зҠ¶дҪ“еј№жҖ§<strong>йҖҗжёҗйҷҚдҪҺ</strong>вҶ’иҝ‘зӮ№<strong>иҝңз§»</strong>пјҲи°ғиҠӮеҠӣдёӢйҷҚпјүпјӣиҝ‘зӮ№<strong>иҝңз§»</strong>и¶…иҝҮдёҖе®ҡйҷҗеәҰ вҶ’ <strong>иҖҒи§Ҷ</strong>пјҲйңҖеҮёйҖҸй•ңзҹ«жӯЈпјүпјӣиҝ‘зӮ№жҳҜиЎЎйҮҸзңј<strong>и°ғиҠӮеҠҹиғҪ