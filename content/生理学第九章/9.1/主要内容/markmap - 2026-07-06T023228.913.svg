127, 127, 127)"/><path class="markmap-link" data-depth="2" data-path="1.17" d="M304,11.75C344,11.75,344,121.672,384,121.672" stroke-width="1.75" stroke="rgb(140, 86, 75)"/><path class="markmap-link" data-depth="2" data-path="1.25" d="M304,11.75C344,11.75,344,261.188,384,261.188" stroke-width="1.75" stroke="rgb(214, 39, 40)"/><g class="markmap-highlight"/><g data-depth="3" data-path="1.2.3" class="markmap-node" transform="translate(625, -274)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="624" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="606" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">感受器：专门感受<strong>内外环境变化</strong>的结构（如游离神经末梢/环层小体/视细胞/毛细胞）   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(625, -246.625)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="430" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="412" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">感觉器官 = 感受器 + <strong>附属结构</strong> + 神经组织（眼/耳/鼻/舌）   </div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(384, -260.3125)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="163" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="161" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="145" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">感受器 vs 感觉器官   </div></div></foreignObject></g><g data-depth="3" data-path="1.5.6" class="markmap-node" transform="translate(571, -214.25)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="333" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="315" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">一种感受器只对<strong>一种特定形式</strong>的刺激最敏感   </div></div></foreignObject></g><g data-depth="3" data-path="1.5.7" class="markmap-node" transform="translate(571, -186.875)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="220" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="202" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">视觉：<strong>380~760nm</strong> 电磁波   </div></div></foreignObject></g><g data-depth="3" data-path="1.5.8" class="markmap-node" transform="translate(571, -159.5)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="228" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="210" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">听觉：声波（20~20000Hz）   </div></div></foreignObject></g><g data-depth="2" data-path="1.5" class="markmap-node" transform="translate(384, -186.875)"><line stroke="#2ca02c" stroke-width="1.75" x1="-1" x2="109" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#2ca02c" fill="var(--markmap-circle-open-bg)" cx="107" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="91" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★适宜刺激   </div></div></foreignObject></g><g data-depth="3" data-path="1.9.10" class="markmap-node" transform="translate(635, -127.125)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="282" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="264" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">将<strong>刺激能量</strong> -&gt; 转换为传入神经的 <strong>AP</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.9.11" class="markmap-node" transform="translate(635, -99.75)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="542" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="524" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>感受器电位</strong>：感受器上产生的过渡性<strong>局部电位</strong> -&gt; 无全或无/可总和/分级式   </div></div></foreignObject></g><g data-depth="3" data-path="1.9.12" class="markmap-node" transform="translate(635, -72.375)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="381" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="363" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>发生器电位</strong>：初级传入神经末梢产生的过渡性电位   </div></div></foreignObject></g><g data-depth="3" data-path="1.9.13" class="markmap-node" transform="translate(635, -45)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="231" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="213" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">本质：<strong>非AP</strong> -&gt; 属于<strong>局部电位</strong>   </div></div></foreignObject></g><g data-depth="2" data-path="1.9" class="markmap-node" transform="translate(384, -86.0625)"><line stroke="#d62728" stroke-width="1.75" x1="-1" x2="173" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#d62728" fill="var(--markmap-circle-open-bg)" cx="171" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="155" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★换能作用（必考）   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.15" class="markmap-node" transform="translate(555, -12.625)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="387" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="369" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">将刺激的<strong>强度/性质/时间</strong>等信息编排成 AP 不同序列   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.16" class="markmap-node" transform="translate(555, 14.75)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="390" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="372" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">强度编码：刺激强 -&gt; <strong>AP频率↑</strong> + 兴奋感受器<strong>数目↑</strong>   </div></div></foreignObject></g><g data-depth="2" data-path="1.14" class="markmap-node" transform="translate(384, 1.0625)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="93" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="91" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="75" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">编码作用   </div></div></foreignObject></g><g data-depth="3" data-path="1.17.18" class="markmap-node" transform="translate(635, 47.125)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="357" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="339" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">恒定强度刺激持续 -&gt; AP频率<strong>逐渐降低</strong>甚至消失   </div></div></foreignObject></g><g data-depth="4" data-path="1.17.19.20" class="markmap-node" transform="translate(854, 79.5)"><line stroke="#8c564b" stroke-width="1.1875" x1="-1" x2="414" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="396" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">例：<strong>皮肤触觉</strong>（环层小体）-&gt; 刺激后很快不再发放冲动   </div></div></foreignObject></g><g data-depth="4" data-path="1.17.19.21" class="markmap-node" transform="translate(854, 106.6875)"><line stroke="#e377c2" stroke-width="1.1875" x1="-1" x2="338" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="320" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">意义：利于接受<strong>新刺激</strong> -&gt; 穿衣服后不再感觉   </div></div></foreignObject></g><g data-depth="3" data-path="1.17.19" class="markmap-node" transform="translate(635, 93.09375)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="141" y1="21.6875" y2="21.6875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="139" cy="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="123" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">快适应感受器：   </div></div></foreignObject></g><g data-depth="4" data-path="1.17.22.23" class="markmap-node" transform="translate(854, 138.875)"><line stroke="#7f7f7f" stroke-width="1.1875" x1="-1" x2="386" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="368" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">例：<strong>痛觉、窦弓压力感受器</strong>、肌梭 -&gt; 持续发放冲动   </div></div></foreignObject></g><g data-depth="4" data-path="1.17.22.24" class="markmap-node" transform="translate(854, 166.0625)"><line stroke="#bcbd22" stroke-width="1.1875" x1="-1" x2="328" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="310" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">意义：利于<strong>持续监测</strong> -&gt; 维持姿势/血压监测   </div></div></foreignObject></g><g data-depth="3" data-path="1.17.22" class="markmap-node" transform="translate(635, 152.46875)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="141" y1="21.6875" y2="21.6875"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="139" cy="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="123" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">慢适应感受器：   </div></div></foreignObject></g><g data-depth="2" data-path="1.17" class="markmap-node" transform="translate(384, 99.796875)"><line stroke="#8c564b" stroke-width="1.75" x1="-1" x2="173" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#8c564b" fill="var(--markmap-circle-open-bg)" cx="171" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="155" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★适应现象（必考）   </div></div></foreignObject></g><g data-depth="3" data-path="1.25.26" class="markmap-node" transform="translate(619, 198.25)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="172" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="154" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">适宜刺激 = 各有所爱   </div></div></foreignObject></g><g data-depth="3" data-path="1.25.27" class="markmap-node" transform="translate(619, 225.625)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="246" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="228" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">换能作用 = 能量转换(局部电位)   </div></div></foreignObject></g><g data-depth="3" data-path="1.25.28" class="markmap-node" transform="translate(619, 253)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="204" y1="21.687