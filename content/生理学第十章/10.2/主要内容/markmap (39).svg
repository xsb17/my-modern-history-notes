1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定位：第一区 = <strong>精确</strong> | 第二区 = <strong>较差</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.15.20" class="markmap-node" transform="translate(667, 58.8125)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="332" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="314" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">功能：第一区 = <strong>精细感觉</strong> | 第二区 = <strong>粗糙分析</strong></div></div></foreignObject></g><g data-depth="2" data-path="1.15" class="markmap-node" transform="translate(357, 4.0625)"><line stroke="#9467bd" stroke-width="1.75" x1="-1" x2="232" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#9467bd" fill="var(--markmap-circle-open-bg)" cx="230" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="214" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">第一感觉区 vs 第二感觉区对比</div></div></foreignObject></g><g data-depth="3" data-path="1.21.22" class="markmap-node" transform="translate(565, 91.1875)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="226" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="208" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">投射至：<strong>中央前回</strong>（运动区）</div></div></foreignObject></g><g data-depth="3" data-path="1.21.23" class="markmap-node" transform="translate(565, 118.5625)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="258" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="240" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">意义：感觉与运动在中枢紧密联系</div></div></foreignObject></g><g data-depth="2" data-path="1.21" class="markmap-node" transform="translate(357, 104.875)"><line stroke="#17becf" stroke-width="1.75" x1="-1" x2="130" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#17becf" fill="var(--markmap-circle-open-bg)" cx="128" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="112" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">本体感觉投射区</div></div></foreignObject></g><g data-depth="3" data-path="1.24.25" class="markmap-node" transform="translate(581, 150.9375)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="386" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="368" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">截肢/神经损伤 -&gt; 皮层代表区<strong>重组</strong> -&gt; 邻近代表区扩张</div></div></foreignObject></g><g data-depth="3" data-path="1.24.26" class="markmap-node" transform="translate(581, 178.3125)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="307" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="289" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">训练（如盲人读盲文）-&gt; 手指代表区<strong>扩大</strong></div></div></foreignObject></g><g data-depth="2" data-path="1.24" class="markmap-node" transform="translate(357, 164.625)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="146" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="144" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="128" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">感觉皮层的可塑性</div></div></foreignObject></g><g data-depth="3" data-path="1.27.28" class="markmap-node" transform="translate(517, 210.6875)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="322" y1="21.687