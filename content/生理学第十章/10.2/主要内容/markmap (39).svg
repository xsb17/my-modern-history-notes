/div></div></foreignObject></g><g data-depth="4" data-path="1.9.10.12" class="markmap-node" transform="translate(885, -142.4375)"><line stroke="#ff7f0e" stroke-width="1.1875" x1="-1" x2="258" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="240" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>正立</strong>分布（不同于第一区的倒置）</div></div></foreignObject></g><g data-depth="4" data-path="1.9.10.13" class="markmap-node" transform="translate(885, -115.25)"><line stroke="#2ca02c" stroke-width="1.1875" x1="-1" x2="82" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="64" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>定位较差</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.9.10" class="markmap-node" transform="translate(741, -142.4375)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="66" y1="21.6875" y2="21.6875"/><circle stroke-width="1.5" r="6" stroke="#17becf" fill="var(--markmap-circle-open-bg)" cx="64" cy="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="48" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">特点：</div></div></foreignObject></g><g data-depth="3" data-path="1.9.14" class="markmap-node" transform="translate(741, -83.0625)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="194" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="176" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">功能：对感觉作<strong>粗糙分析</strong></div></div></foreignObject></g><g data-depth="2" data-path="1.9" class="markmap-node" transform="translate(357, -112.75)"><line stroke="#d62728" stroke-width="1.75" x1="-1" x2="306" y1="21.875" y2="21.875"/><circle stroke-