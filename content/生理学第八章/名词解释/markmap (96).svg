<svg xmlns="http://www.w3.org/2000/svg" class="w-full h-full leading-none markmap mm-gpvzjv-1" style=""><style>.markmap{--markmap-max-width: 9999px;--markmap-a-color: #0097e6;--markmap-a-hover-color: #00a8ff;--markmap-code-bg: #f0f0f0;--markmap-code-color: #555;--markmap-highlight-bg: #ffeaa7;--markmap-table-border: 1px solid currentColor;--markmap-font: 300 16px/20px sans-serif;--markmap-circle-open-bg: #fff;--markmap-text-color: #333;--markmap-highlight-node-bg: #ff02;font:var(--markmap-font);color:var(--markmap-text-color)}.markmap-link{fill:none}.markmap-node&gt;circle{cursor:pointer}.markmap-foreign{display:inline-block}.markmap-foreign p{margin:0}.markmap-foreign a{color:var(--markmap-a-color)}.markmap-foreign a:hover{color:var(--markmap-a-hover-color)}.markmap-foreign code{padding:.25em;font-size:calc(1em - 2px);color:var(--markmap-code-color);background-color:var(--markmap-code-bg);border-radius:2px}.markmap-foreign pre{margin:0}.markmap-foreign pre&gt;code{display:block}.markmap-foreign del{text-decoration:line-through}.markmap-foreign em{font-style:italic}.markmap-foreign strong{font-weight:700}.markmap-foreign mark{background:var(--markmap-highlight-bg)}.markmap-foreign table,.markmap-foreign th,.markmap-foreign td{border-collapse:collapse;border:var(--markmap-table-border)}.markmap-foreign img{display:inline-block}.markmap-foreign svg{fill:currentColor}.markmap-foreign&gt;div{width:var(--markmap-max-width);text-align:left}.markmap-foreign&gt;div&gt;div{display:inline-block}.markmap-highlight rect{fill:var(--markmap-highlight-node-bg)}.markmap-dark .markmap{--markmap-code-bg: #1a1b26;--markmap-code-color: #ddd;--markmap-circle-open-bg: #444;--markmap-text-color: #eee}</style><g transform="translate(46.013310314311354,338.3551976844541) scale(0.3017796475097964)"><path class="markmap-link" data-depth="3" data-path="1.2.3" d="M361,-162.875C401,-162.875,401,-190.437,441,-190.437" stroke-width="1.375" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="3" data-path="1.2.4" d="M361,-162.875C401,-162.875,401,-163.062,441,-163.062" stroke-width="1.375" stroke="rgb(140, 86, 75)"/><path class="markmap-link" data-depth="3" data-path="1.2.5" d="M361,-162.875C401,-162.875,401,-135.687,441,-135.687" stroke-width="1.375" stroke="rgb(227, 119, 194)"/><path class="markmap-link" data-depth="3" data-path="1.6.7" d="M488,-75.75C528,-75.75,528,-103.312,568,-103.312" stroke-width="1.375" stroke="rgb(188, 189, 34)"/><path class="markmap-link" data-depth="3" data-path="1.6.8" d="M488,-75.75C528,-75.75,528,-75.937,568,-75.937" stroke-width="1.375" stroke="rgb(23, 190, 207)"/><path class="markmap-link" data-depth="3" data-path="1.6.9" d="M488,-75.75C528,-75.75,528,-48.562,568,-48.562" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="3" data-path="1.10.11" d="M377,11.375C417,11.375,417,-16.187,457,-16.187" stroke-width="1.375" stroke="rgb(44, 160, 44)"/><path class="markmap-link" data-depth="3" data-path="1.10.12" d="M377,11.375C417,11.375,417,11.188,457,11.188" stroke-width="1.375" stroke="rgb(214, 39, 40)"/><path class="markmap-link" data-depth="3" data-path="1.10.13" d="M377,11.375C417,11.375,417,38.563,457,38.563" stroke-width="1.375" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="3" data-path="1.14.15" d="M409,98.5C449,98.5,449,70.938,489,70.938" stroke-width="1.375" stroke="rgb(188, 189, 34)"/><path class="markmap-link" data-depth="3" data-path="1.14.16" d="M409,98.5C449,98.5,449,98.313,489,98.313" stroke-width="1.375" stroke="rgb(23, 190, 207)"/><path class="markmap-link" data-depth="3" data-path="1.14.17" d="M409,98.5C449,98.5,449,125.688,489,125.688" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="3" data-path="1.18.19" d="M399,185.625C439,185.625,439,158.063,479,158.063" stroke-width="1.375" stroke="rgb(23, 190, 207)"/><path class="markmap-link" data-depth="3" data-path="1.18.20" d="M399,185.625C439,185.625,439,185.438,479,185.438" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="3" data-path="1.18.21" d="M399,185.625C439,185.625,439,212.813,479,212.813" stroke-width="1.375" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.2" d="M222,11.75C262,11.75,262,-162.875,302,-162.875" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.6" d="M222,11.75C262,11.75,262,-75.75,302,-75.75" stroke-width="1.75" stroke="rgb(127, 127, 127)"/><path class="markmap-link" data-depth="2" data-path="1.10" d="M222,11.75C262,11.75,262,11.375,302,11.375" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.14" d="M222,11.75C262,11.75,262,98.5,302,98.5" stroke-width="1.75" stroke="rgb(127, 127, 127)"/><path class="markmap-link" data-depth="2" data-path="1.18" d="M222,11.75C262,11.75,262,185.625,302,185.625" stroke-width="1.75" stroke="rgb(188, 189, 34)"/><g class="markmap-highlight"/><g data-depth="3" data-path="1.2.3" class="markmap-node" transform="translate(441, -212.125)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="733" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="715" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：机体将<strong>代谢产物</strong>、摄入的<strong>过剩物质</strong>、<strong>异物</strong>及<strong>有害物质</strong>等经<strong>血液循环</strong>由相应途径排出体外的过程   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(441, -184.75)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="890" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="872" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：主要途径为<strong>肾脏</strong>（最主要排泄器官），辅助途径包括皮肤（出汗）、呼吸器官（呼出 CO₂）、消化器官（胆汁）   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.5" class="markmap-node" transform="translate(441, -157.375)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="1240" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1222" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：维持<strong>内环境稳态</strong>的核心环节；肾脏排泄功能丧失 → 尿毒症；注意与"排遗"区分（排泄=代谢终产物经血液循环排出，排遗=未吸收的食物残渣经消化道排出）   </div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(302, -184.75)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="61" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="59" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="43" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>排泄</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.7" class="markmap-node" transform="translate(568, -125)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="525" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="507" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：<strong>每分钟</strong>双肾生成的<strong>超滤液量</strong>，是衡量肾小球<strong>滤过功能</strong>的定量指标   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.8" class="markmap-node" transform="translate(568, -97.625)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="409" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="391" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：正常成人安静时 <strong>125 ml/min</strong> = <strong>180 L/d</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.9" class="markmap-node" transform="translate(568, -70.25)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="1166" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1148" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：反映肾小球滤过功能的<strong>金标准</strong>；GFR↓ → 肾功能减退；是计算<strong>滤过分数</strong>的基础（FF = GFR ÷ 肾血浆流量 ≈ <strong>19%</strong>）；临床常用肌酐清除率估测 GFR   </div></div></foreignObject></g><g data-depth="2" data-path="1.6" class="markmap-node" transform="translate(302, -97.625)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="188" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="186" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="170" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>肾小球滤过率（GFR）</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.10.11" class="markmap-node" transform="translate(457, -37.875)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="909" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="891" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：当血糖浓度升高到一定程度，部分近端小管对葡萄糖的重吸收达到<strong>极限</strong>，<strong>尿中开始出现葡萄糖</strong>时对应的<strong>血浆葡萄糖浓度</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.10.12" class="markmap-node" transform="translate(457, -10.5)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="1070" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1052" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：<strong>180 mg/100ml</strong>；葡萄糖重吸收极限量：男 <strong>375 mg/min</strong>、女 <strong>300 mg/min</strong>；血糖达 <strong>300 mg/100ml</strong> 时尿糖排出与血糖浓度平行增加   </div></div></foreignObject></g><g data-depth="3" data-path="1.10.13" class="markmap-node" transform="translate(457, 16.875)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="1138" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1120" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：反映近端小管对葡萄糖<strong>重吸收能力</strong>的界限；是理解和诊断<strong>糖尿</strong>的基础概念（血糖 &gt; 肾糖阈 → 尿糖阳性）；糖尿病诊断和疗效监测的重要参考值   </div></div></foreignObject></g><g data-depth="2" data-path="1.10" class="markmap-node" transform="translate(302, -10.5)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="77" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="75" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="59" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>肾糖阈</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.15" class="markmap-node" transform="translate(489, 49.25)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="637" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="619" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：由于<strong>小管液中溶质浓度增加</strong>、<strong>渗透压升高</strong>，使水钠重吸收<strong>减少</strong>而引起的<strong>利尿</strong>现象   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.16" class="markmap-node" transform="translate(489, 76.625)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="767" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="749" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：机制链：小管液溶质浓度↑ → 小管液渗透压↑ → 对抗水的重吸收 → 水重吸收↓ → <strong>尿量↑</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.17" class="markmap-node" transform="translate(489, 104)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="1793" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1775" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：临床典型实例 → <strong>糖尿病多尿</strong>（高血糖超肾糖阈 → 小管液葡萄糖↑ → 渗透压↑ → 多尿）；<strong>甘露醇利尿</strong>（甘露醇不被重吸收 → 滞留小管液 → 渗透压↑ → 达到脱水/降颅压/利尿目的）；渗透性利尿的溶质必须是<strong>不被或不易被重吸收</strong>的物质   </div></div></foreignObject></g><g data-depth="2" data-path="1.14" class="markmap-node" transform="translate(302, 76.625)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="109" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="107" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="91" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>渗透性利尿</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.18.19" class="markmap-node" transform="translate(479, 136.375)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="786" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="768" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：近端小管中钠和水的重吸收率总是占肾小球滤过率的 <strong>65%~70%</strong> 的现象，即近端小管保持<strong>定比重吸收</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.18.20" class="markmap-node" transform="translate(479, 163.75)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="920" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="902" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：重吸收比例恒定在 <strong>65%~70%</strong>（无论 GFR 如何变化）；若 GFR 为 125 ml/min → 近端小管重吸收约 81~88 ml/min   </div></div></foreignObject></g><g data-depth="3" data-path="1.18.21" class="markmap-node" transform="translate(479, 191.125)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="1395" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1377" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：保持<strong>尿量相对恒定</strong>（GFR 在一定范围内波动时尿量不致剧烈变化）；维持<strong>有效循环血量</strong>的稳定；是肾小管与肾小球功能<strong>协调配合</strong>的重要体现；破坏球管平衡 → 尿量异常增多或减少   </div></div></foreignObject></g><g data-depth="2" data-path="1.18" class="markmap-node" transform="translate(302, 163.75)"><line stroke="#bcbd22" stroke-width="1.75" x1="-1" x2="99" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#bcbd22" fill="var(--markmap-circle-open-bg)" cx="97" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="81" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>球-管平衡</strong>   </div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10.5)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="224" y1="22.25" y2="22.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="222" cy="22.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="206" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">第八章 课后练习题名词解释   </div></div></foreignObject></g></g></svg>