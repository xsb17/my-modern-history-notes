.w3.org/1999/xhtml">例：血液生化指标有参考范围，表明内环境在波动中维持相对稳定</div></div></foreignObject></g><g data-depth="2" data-path="1.9" class="markmap-node" transform="translate(309, -88.09375)"><line stroke="#d62728" stroke-width="1.75" x1="-1" x2="191" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#d62728" fill="var(--markmap-circle-open-bg)" cx="189" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="173" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★稳态（Homeostasis）</div></div></foreignObject></g><g data-depth="3" data-path="1.13.14" class="markmap-node" transform="translate(469, -28.34375)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="367" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="349" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">机体功能按时间顺序发生<strong>周期性变化</strong>（日/月/年）</div></div></foreignObject></g><g data-depth="3" data-path="1.13.15" class="markmap-node" transform="translate(469, -0.9687500596046448)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="280" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="262" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">2017 年诺贝尔奖：<strong>昼夜节律</strong>分子机制</div></div></foreignObject></g><g data-depth="2" data-path="1.13" class="markmap-node" transform="translate(309, -14.65625)"><line stroke="#e377c2" stroke-width="1.75" x1="-1" x2="82" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#e377c2" fill="var(--markmap-circle-open-bg)" cx="80" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="64" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生物节律</div></div></foreignObject></g><g data-depth="3" data-path