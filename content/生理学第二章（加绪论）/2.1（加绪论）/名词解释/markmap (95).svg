<svg xmlns="http://www.w3.org/2000/svg" class="w-full h-full leading-none markmap mm-gpvzjv-1" style=""><style>.markmap{--markmap-max-width: 9999px;--markmap-a-color: #0097e6;--markmap-a-hover-color: #00a8ff;--markmap-code-bg: #f0f0f0;--markmap-code-color: #555;--markmap-highlight-bg: #ffeaa7;--markmap-table-border: 1px solid currentColor;--markmap-font: 300 16px/20px sans-serif;--markmap-circle-open-bg: #fff;--markmap-text-color: #333;--markmap-highlight-node-bg: #ff02;font:var(--markmap-font);color:var(--markmap-text-color)}.markmap-link{fill:none}.markmap-node&gt;circle{cursor:pointer}.markmap-foreign{display:inline-block}.markmap-foreign p{margin:0}.markmap-foreign a{color:var(--markmap-a-color)}.markmap-foreign a:hover{color:var(--markmap-a-hover-color)}.markmap-foreign code{padding:.25em;font-size:calc(1em - 2px);color:var(--markmap-code-color);background-color:var(--markmap-code-bg);border-radius:2px}.markmap-foreign pre{margin:0}.markmap-foreign pre&gt;code{display:block}.markmap-foreign del{text-decoration:line-through}.markmap-foreign em{font-style:italic}.markmap-foreign strong{font-weight:700}.markmap-foreign mark{background:var(--markmap-highlight-bg)}.markmap-foreign table,.markmap-foreign th,.markmap-foreign td{border-collapse:collapse;border:var(--markmap-table-border)}.markmap-foreign img{display:inline-block}.markmap-foreign svg{fill:currentColor}.markmap-foreign&gt;div{width:var(--markmap-max-width);text-align:left}.markmap-foreign&gt;div&gt;div{display:inline-block}.markmap-highlight rect{fill:var(--markmap-highlight-node-bg)}.markmap-dark .markmap{--markmap-code-bg: #1a1b26;--markmap-code-color: #ddd;--markmap-circle-open-bg: #444;--markmap-text-color: #eee}</style><g transform="translate(37.24786744561251,328.5689873451224) scale(0.2630788942412551)"><path class="markmap-link" data-depth="3" data-path="1.2.3" d="M340,-119.312C380,-119.312,380,-146.875,420,-146.875" stroke-width="1.375" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="3" data-path="1.2.4" d="M340,-119.312C380,-119.312,380,-119.5,420,-119.5" stroke-width="1.375" stroke="rgb(140, 86, 75)"/><path class="markmap-link" data-depth="3" data-path="1.2.5" d="M340,-119.312C380,-119.312,380,-92.125,420,-92.125" stroke-width="1.375" stroke="rgb(227, 119, 194)"/><path class="markmap-link" data-depth="3" data-path="1.6.7" d="M356,-32.187C396,-32.187,396,-59.75,436,-59.75" stroke-width="1.375" stroke="rgb(188, 189, 34)"/><path class="markmap-link" data-depth="3" data-path="1.6.8" d="M356,-32.187C396,-32.187,396,-32.375,436,-32.375" stroke-width="1.375" stroke="rgb(23, 190, 207)"/><path class="markmap-link" data-depth="3" data-path="1.6.9" d="M356,-32.187C396,-32.187,396,-5,436,-5" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="3" data-path="1.10.11" d="M356,54.938C396,54.938,396,27.375,436,27.375" stroke-width="1.375" stroke="rgb(44, 160, 44)"/><path class="markmap-link" data-depth="3" data-path="1.10.12" d="M356,54.938C396,54.938,396,54.75,436,54.75" stroke-width="1.375" stroke="rgb(214, 39, 40)"/><path class="markmap-link" data-depth="3" data-path="1.10.13" d="M356,54.938C396,54.938,396,82.125,436,82.125" stroke-width="1.375" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="3" data-path="1.14.15" d="M356,142.063C396,142.063,396,114.5,436,114.5" stroke-width="1.375" stroke="rgb(188, 189, 34)"/><path class="markmap-link" data-depth="3" data-path="1.14.16" d="M356,142.063C396,142.063,396,141.875,436,141.875" stroke-width="1.375" stroke="rgb(23, 190, 207)"/><path class="markmap-link" data-depth="3" data-path="1.14.17" d="M356,142.063C396,142.063,396,169.25,436,169.25" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="2" data-path="1.2" d="M185,11.75C225,11.75,225,-119.312,265,-119.312" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.6" d="M185,11.75C225,11.75,225,-32.187,265,-32.187" stroke-width="1.75" stroke="rgb(127, 127, 127)"/><path class="markmap-link" data-depth="2" data-path="1.10" d="M185,11.75C225,11.75,225,54.938,265,54.938" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.14" d="M185,11.75C225,11.75,225,142.063,265,142.063" stroke-width="1.75" stroke="rgb(127, 127, 127)"/><g class="markmap-highlight"/><g data-depth="3" data-path="1.2.3" class="markmap-node" transform="translate(420, -168.5625)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="925" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="907" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：受控部分发出的<strong>反馈信息</strong>调整控制部分的活动，最终使受控部分的活动朝着与它<strong>原先活动变化相反的方向</strong>改变的控制方式   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(420, -141.1875)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="934" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="916" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：控制部分→受控部分→反馈信息→控制部分（闭环回路）；与正反馈相反——负反馈是<strong>反向纠偏</strong>、正反馈是<strong>同向推进</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.5" class="markmap-node" transform="translate(420, -113.8125)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="1870" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1852" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：人体内<strong>极为多见</strong>，是<strong>维持内环境稳态</strong>的最重要调节方式；典型实例→<strong>体温调节</strong>（体温↑→散热↑/产热↓）、<strong>血压调节/减压反射</strong>（血压↑→迷走↑/交感↓→血压↓）、<strong>血糖调节</strong>（血糖↑→胰岛素↑→血糖↓）；特点：存在波动和滞后，需要前馈补充   </div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(265, -141.1875)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="77" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="75" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="59" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>负反馈</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.7" class="markmap-node" transform="translate(436, -81.4375)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="861" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="843" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：<strong>脂溶性</strong>小分子物质直接经细胞膜<strong>脂质双分子层</strong>间隙，由<strong>高浓度一侧向低浓度一侧</strong>顺浓度梯度跨膜扩散的转运方式   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.8" class="markmap-node" transform="translate(436, -54.0625)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="1110" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1092" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：属于<strong>被动转运</strong>（不耗能、不需膜蛋白介导）；转运速度取决于膜两侧<strong>浓度差</strong>和膜对该物质的<strong>通透性</strong>；原理为<strong>相似相溶</strong>——脂溶性越高扩散越快   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.9" class="markmap-node" transform="translate(436, -26.6875)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="1442" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1424" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：是细胞膜上<strong>最简单</strong>的转运方式；代表物质→<strong>O₂、CO₂、NO、NH₃</strong>（气体分子）、乙醇、甘油、尿素、类固醇激素等脂溶性物质；不带电荷的极性小分子如<strong>水</strong>也可通过单纯扩散但速度极慢   </div></div></foreignObject></g><g data-depth="2" data-path="1.6" class="markmap-node" transform="translate(265, -54.0625)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="93" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="91" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="75" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>单纯扩散</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.10.11" class="markmap-node" transform="translate(436, 5.6875)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="1066" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1048" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：非脂溶性或脂溶性极低的小分子物质在<strong>膜蛋白</strong>（载体蛋白或通道蛋白）的帮助下，<strong>顺浓度梯度和（或）电位梯度</strong>进行的跨膜转运，<strong>不消耗ATP</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.10.12" class="markmap-node" transform="translate(436, 33.0625)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="1673" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1655" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：分为两型→<strong>经通道易化扩散</strong>（转运离子和水、具有离子选择性和门控特性、速度快、无饱和现象）和<strong>经载体易化扩散</strong>（转运葡萄糖/氨基酸等小分子有机物、具有<strong>结构特异性</strong>、<strong>饱和现象</strong>和<strong>竞争性抑制</strong>三大特征、速度较慢）   </div></div></foreignObject></g><g data-depth="3" data-path="1.10.13" class="markmap-node" transform="translate(436, 60.4375)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="1863" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1845" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：解决了<strong>非脂溶性</strong>必需物质（如葡萄糖、氨基酸、Na⁺/K⁺/Ca²⁺等离子）无法直接穿过脂质双分子层的问题；载体介导是<strong>葡萄糖进入大多数组织细胞</strong>的主要方式；通道介导是<strong>离子跨膜流动</strong>和电活动产生的基础；属于<strong>被动转运</strong>（不需ATP但需膜蛋白）   </div></div></foreignObject></g><g data-depth="2" data-path="1.10" class="markmap-node" transform="translate(265, 33.0625)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="93" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="91" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="75" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>易化扩散</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.15" class="markmap-node" transform="translate(436, 92.8125)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="920" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="902" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：某些物质在<strong>膜蛋白</strong>的帮助下，<strong>逆浓度梯度和（或）电位梯度</strong>进行跨膜转运的方式，<strong>必须消耗能量</strong>（直接或间接利用ATP）   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.16" class="markmap-node" transform="translate(436, 120.1875)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="1977" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1959" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：分为两型→<strong>原发性主动转运</strong>（直接利用ATP分解供能，如<strong>钠-钾泵/Na⁺-K⁺-ATP酶</strong>——每分解1个ATP泵出<strong>3个Na⁺</strong>+泵入<strong>2个K⁺</strong>、生电性）和<strong>继发性主动转运</strong>（能量来自Na⁺浓度梯度而非直接ATP，如<strong>Na⁺-葡萄糖同向转运</strong>在小肠/肾小管吸收葡萄糖、Na⁺-Ca²⁺逆向交换）   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.17" class="markmap-node" transform="translate(436, 147.5625)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="2267" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="2249" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：钠泵建立和维持的<strong>Na⁺/K⁺不均衡分布</strong>是神经肌肉<strong>兴奋性</strong>的基础；钠泵维持胞内<strong>渗透压</strong>和<strong>细胞容积</strong>正常（防止细胞水肿）；钠泵建立的<strong>Na⁺浓度势能贮备</strong>是继发性主动转运的能量来源；钠泵是<strong>生电性</strong>的，可影响膜电位；主动转运使细胞能主动摄取必需物质、排出废物，是维持<strong>细胞内外成分差异</strong>的关键机制   </div></div></foreignObject></g><g data-depth="2" data-path="1.14" class="markmap-node" transform="translate(265, 120.1875)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="93" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="91" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="75" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>主动转运</strong>   </div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10.5)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="187" y1="22.25" y2="22.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="185" cy="22.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="169" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">2.1 课后练习题名词解释</div></div></foreignObject></g></g></svg>