 119, 194)"/><path class="markmap-link" data-depth="2" data-path="1.25" d="M261,11.75C301,11.75,301,265.906,341,265.906" stroke-width="1.75" stroke="rgb(148, 103, 189)"/><g class="markmap-highlight"/><g data-depth="3" data-path="1.2.3" class="markmap-node" transform="translate(533, -278.71875)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="402" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="384" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">在 RP 基础上接受<strong>有效刺激</strong> -&gt; 快速可传播的膜电位波动</div></div></foreignObject></g><g data-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(533, -251.34375)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="194" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="176" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">锋电位 = <strong>动作电位的标志</strong></div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(341, -265.03125)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="114" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="112" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="96" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">动作电位定义</div></div></foreignObject></g><g data-depth="3" data-path="1.5.6" class="markmap-node" transform="translate(517, -218.96875)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="323" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="305" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">刺激三参数：<strong>强度 / 时间 / 强度-时间变化率</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.5.7" class="markmap-node" transform="translate(517, -191.59375)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="252" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="234" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">阈刺激：引起 AP 的<strong>最小强度</strong>刺激</div></div></foreignObject></g><g data-depth="3" data-path="1.5.8" class="markmap-node" transform="translate(517, -164.21875)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="413" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="395" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">阈强度（阈值）= 衡量<strong>兴奋性</strong>的指标（兴奋性 = 1/阈值）</div></div></foreignObject></g><g data-depth="3" data-path="1.5.9" class="markmap-node" transform="translate(517, -136.84375)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="396" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="378" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">阈电位：引发 AP 的<strong>临界膜电位</strong>（比 RP 小 10~20mV）</div></div></foreignObject></g><g data-depth="2" data-path="1.5" class="markmap-node" transform="translate(341, -177.90625)"><line stroke="#2ca02c" stroke-width="1.75" x1="-1" x2="98" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#2ca02c" fill="var(--markmap-circle-open-bg)" cx="96" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="80" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★产生条件</div></div></foreignObject></g><g data-depth="3" data-path="1.10.11" class="markmap-node" transform="translate(540, -104.46875)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="539" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="521" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">锋电位：上升支（去极化 <strong>-70→+30mV</strong>）+ 下降支（复极化 +30→-70mV）</div></div></foreignObject></g><g data-depth="3" data-path="1.10.12" class="markmap-node" transform="translate(540, -77.09375)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="414" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="396" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">后电位：负后电位（去极化后）+ 正后电位（超极化后）</div></div></foreignObject></g><g data-depth="2" data-path="1.10" class="markmap-node" transform="translate(341, -90.78125)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="121" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="119" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="103" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★AP 形态分期</div></div></foreignObject></g><g data-depth="3" data-path="1.13.14" class="markmap-node" transform="translate(629, -44.71875)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="332" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="314" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">前提：膜外 Na⁺ <strong>高</strong>/膜内 Na⁺ <strong>低</strong>（外高内低）</div></div></foreignObject></g><g data-depth="3" data-path="1.13.15" class="markmap-node" transform="translate(629, -17.34375)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="351" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="333" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">刺激 -&gt; 达<strong>阈电位</strong> -&gt; 电压门控 <strong>Na⁺ 通道</strong>大量开放</div></div></foreignObject></g><g data-depth="3" data-path="1.13.16" class="markmap-node" transform="translate(629, 10.03125)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="232" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="214" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">-&gt; <strong>Na⁺ 大量内流</strong> -&gt; 膜去极化↑</div></div></foreignObject></g><g data-depth="3" data-path="1.13.17" class="markmap-node" transform="translate(629, 37.40625)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="444" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="426" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">-&gt; 更多 Na⁺ 通道开放（<strong>正反馈</strong>）-&gt; 膜内电位变为正值 -&gt; <strong>超射</strong></div></div></foreignObject></g><g data-depth="2" data-path="1.13" class="markmap-node" transform="translate(341, -3.65625)"><line stroke="#e377c2" stroke-width="1.75" x1="-1" x2="210" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#e377c2" fill="var(--markmap-circle-open-bg)" cx="208" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="192" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★去极化相（上升支）机制</div></div></foreignObject></g><g data-depth="3" data-path="1.18.19" class="markmap-node" transform="translate(629, 69.78125)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="261" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="243" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>Na⁺ 通道失活</strong>关闭 -&gt; Na⁺ 内流<strong>停止</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.18.20" class="markmap-node" transform="translate(629, 97.15625)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="210" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="192" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>K⁺ 通透性升高</strong> -&gt; <strong>K⁺ 外流↑</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.18.21" class="markmap-node" transform="translate(629, 124.53125)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="296" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="278" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">-&gt; 膜内电位向负值恢复 -&gt; 回到静息电位</div></div></foreignObject></g><g data-depth="2" data-path="1.18" class="markmap-node" transform="translate(341, 97.15625)"><line stroke="#bcbd22" stroke-width="1.75" x1="-1" x2="210" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#bcbd22" fill="var(--markmap-circle-open-bg)" cx="208" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="192" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★复极化相（下降支）机制</div></div></foreignObject></g><g data-depth="3" data-path="1.22.23" class="markmap-node" transform="translate(517, 156.90625)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="343" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="325" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">负后电位：胞外 K⁺ 一过性<strong>蓄积</strong> -&gt; 阻碍 K⁺ 外流</div></div></foreignObject></g><g data-depth="3" data-path="1.22.24" class="markmap-node" transform="translate(517, 184.28125)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="506" y1="21.6