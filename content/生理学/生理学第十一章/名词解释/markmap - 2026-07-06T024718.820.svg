<svg xmlns="http://www.w3.org/2000/svg" class="w-full h-full leading-none markmap mm-gpvzjv-1" style=""><style>.markmap{--markmap-max-width: 9999px;--markmap-a-color: #0097e6;--markmap-a-hover-color: #00a8ff;--markmap-code-bg: #f0f0f0;--markmap-code-color: #555;--markmap-highlight-bg: #ffeaa7;--markmap-table-border: 1px solid currentColor;--markmap-font: 300 16px/20px sans-serif;--markmap-circle-open-bg: #fff;--markmap-text-color: #333;--markmap-highlight-node-bg: #ff02;font:var(--markmap-font);color:var(--markmap-text-color)}.markmap-link{fill:none}.markmap-node&gt;circle{cursor:pointer}.markmap-foreign{display:inline-block}.markmap-foreign p{margin:0}.markmap-foreign a{color:var(--markmap-a-color)}.markmap-foreign a:hover{color:var(--markmap-a-hover-color)}.markmap-foreign code{padding:.25em;font-size:calc(1em - 2px);color:var(--markmap-code-color);background-color:var(--markmap-code-bg);border-radius:2px}.markmap-foreign pre{margin:0}.markmap-foreign pre&gt;code{display:block}.markmap-foreign del{text-decoration:line-through}.markmap-foreign em{font-style:italic}.markmap-foreign strong{font-weight:700}.markmap-foreign mark{background:var(--markmap-highlight-bg)}.markmap-foreign table,.markmap-foreign th,.markmap-foreign td{border-collapse:collapse;border:var(--markmap-table-border)}.markmap-foreign img{display:inline-block}.markmap-foreign svg{fill:currentColor}.markmap-foreign&gt;div{width:var(--markmap-max-width);text-align:left}.markmap-foreign&gt;div&gt;div{display:inline-block}.markmap-highlight rect{fill:var(--markmap-highlight-node-bg)}.markmap-dark .markmap{--markmap-code-bg: #1a1b26;--markmap-code-color: #ddd;--markmap-circle-open-bg: #444;--markmap-text-color: #eee}</style><g transform="translate(14.13665041269411,335.1952949878162) scale(0.2554071535270487)"><path class="markmap-link" data-depth="3" data-path="1.2.3" d="M394,-75.75C434,-75.75,434,-103.312,474,-103.312" stroke-width="1.375" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="3" data-path="1.2.4" d="M394,-75.75C434,-75.75,434,-75.937,474,-75.937" stroke-width="1.375" stroke="rgb(140, 86, 75)"/><path class="markmap-link" data-depth="3" data-path="1.2.5" d="M394,-75.75C434,-75.75,434,-48.562,474,-48.562" stroke-width="1.375" stroke="rgb(227, 119, 194)"/><path class="markmap-link" data-depth="3" data-path="1.6.7" d="M362,11.375C402,11.375,402,-16.187,442,-16.187" stroke-width="1.375" stroke="rgb(188, 189, 34)"/><path class="markmap-link" data-depth="3" data-path="1.6.8" d="M362,11.375C402,11.375,402,11.188,442,11.188" stroke-width="1.375" stroke="rgb(23, 190, 207)"/><path class="markmap-link" data-depth="3" data-path="1.6.9" d="M362,11.375C402,11.375,402,38.563,442,38.563" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="3" data-path="1.10.11" d="M330,98.5C370,98.5,370,70.938,410,70.938" stroke-width="1.375" stroke="rgb(44, 160, 44)"/><path class="markmap-link" data-depth="3" data-path="1.10.12" d="M330,98.5C370,98.5,370,98.313,410,98.313" stroke-width="1.375" stroke="rgb(214, 39, 40)"/><path class="markmap-link" data-depth="3" data-path="1.10.13" d="M330,98.5C370,98.5,370,125.688,410,125.688" stroke-width="1.375" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="2" data-path="1.2" d="M191,11.75C231,11.75,231,-75.75,271,-75.75" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.6" d="M191,11.75C231,11.75,231,11.375,271,11.375" stroke-width="1.75" stroke="rgb(127, 127, 127)"/><path class="markmap-link" data-depth="2" data-path="1.10" d="M191,11.75C231,11.75,231,98.5,271,98.5" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><g class="markmap-highlight"/><g data-depth="3" data-path="1.2.3" class="markmap-node" transform="translate(474, -125)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="893" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="875" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：由下丘脑<strong>促垂体区</strong>小细胞神经元分泌的、能调节<strong>腺垂体</strong>活动的激素，因其化学结构大多为<strong>多肽</strong>，故称为下丘脑调节肽   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(474, -97.625)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="1396" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1378" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：已知有九种→<strong>GHRH/SS</strong>（调控GH）、<strong>TRH</strong>（调控TSH）、<strong>CRH</strong>（调控ACTH）、<strong>GnRH</strong>（调控FSH/LH）、<strong>PRF/PIF</strong>（调控PRL）；分泌经<strong>下丘脑-垂体门脉系统</strong>进入腺垂体；以<strong>脉冲式</strong>分泌   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.5" class="markmap-node" transform="translate(474, -70.25)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="1714" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1696" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：是<strong>下丘脑调控腺垂体</strong>乃至<strong>全身内分泌功能</strong>的核心枢纽；构成下丘脑-腺垂体-靶腺<strong>三级调节轴</strong>的最上端；通过正/负双重调控（如 GHRH 促进 GH / SS 抑制 GH）实现<strong>精细调控</strong>；是理解神经-内分泌联系（神经内分泌）的关键概念   </div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(271, -97.625)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="125" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="123" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="107" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>下丘脑调节肽</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.7" class="markmap-node" transform="translate(442, -37.875)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="925" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="907" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：某激素本身<strong>不能直接</strong>对某些组织细胞产生生物效应，但它的存在却是<strong>另一种激素</strong>发挥效应的<strong>必要基础</strong>的激素相互作用方式   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.8" class="markmap-node" transform="translate(442, -10.5)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="1478" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1460" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：经典实例→<strong>糖皮质激素</strong>本身不直接缩血管，但它的存在是**儿茶酚胺（肾上腺素/去甲肾上腺素）**发挥缩血管效应的必要条件；属于激素相互作用的四种方式之一（协同、拮抗、<strong>允许</strong>、竞争）   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.9" class="markmap-node" transform="translate(442, 16.875)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="2535" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="2517" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：允许作用使机体对激素的反应具有<strong>条件依赖性</strong>和<strong>可调节性</strong>；在<strong>应激反应</strong>中尤为重要（GC 允许儿茶酚胺维持心血管功能→缺 GC 则应激时血压不能维持）；临床上肾上腺皮质功能减退（艾迪生病）患者→GC 不足→心血管对儿茶酚胺反应↓→<strong>低血压/休克风险</strong>；允许作用也是解释某些激素"增效"现象的分子基础（如 GC 上调儿茶酚胺受体表达）   </div></div></foreignObject></g><g data-depth="2" data-path="1.6" class="markmap-node" transform="translate(271, -10.5)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="93" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="91" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="75" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>允许作用</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.10.11" class="markmap-node" transform="translate(410, 49.25)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="957" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="939" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：由<strong>内分泌腺</strong>或散在于组织和器官中的<strong>内分泌细胞</strong>合成与分泌，以<strong>体液</strong>为媒介，在细胞之间递送调节信息的<strong>高效能生物活性物质</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.10.12" class="markmap-node" transform="translate(410, 76.625)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="1895" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1877" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：分类→<strong>胺类</strong>（甲状腺激素/肾上腺素）、<strong>蛋白质/肽类</strong>（胰岛素/下丘脑调节肽）、<strong>脂类</strong>（类固醇激素如GC/性激素+二十烷酸类如前列腺素）；运输方式→远距分泌/旁分泌/自分泌/神经内分泌/胞内分泌；作用特征→<strong>特异性+信使作用+高效生物放大+相互作用</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.10.13" class="markmap-node" transform="translate(410, 104)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="2406" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="2388" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：激素是<strong>内分泌系统</strong>发挥调节功能的<strong>核心化学信使</strong>；不需自身参与具体生理活动→仅<strong>传递信息</strong>（信使作用）；极低浓度即可产生显著效应（<strong>高效能</strong>，因信号转导中的级联放大）；激素分泌受<strong>生物节律</strong>和<strong>反馈调控</strong>（以负反馈为主）→维持内环境稳态；激素分泌或作用异常→多种<strong>内分泌疾病</strong>（如甲亢/甲减/糖尿病/库欣综合征等）   </div></div></foreignObject></g><g data-depth="2" data-path="1.10" class="markmap-node" transform="translate(271, 76.625)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="61" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="59" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="43" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>激素</strong>   </div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10.5)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="193" y1="22.25" y2="22.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="191" cy="22.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="175" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">11 课后练习题名词解释   </div></div></foreignObject></g></g></svg>