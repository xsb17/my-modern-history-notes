" x1="-1" x2="321" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#2ca02c" fill="var(--markmap-circle-open-bg)" cx="319" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="303" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★糖皮质激素（GC）——血浆最多为<strong>皮质醇</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.7.8" class="markmap-node" transform="translate(493, -155.96875)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="427" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="409" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">① 糖代谢：<strong>抗胰岛素样作用</strong> -&gt; <strong>升高血糖</strong>（糖尿病人慎用）</div></div></foreignObject></g><g data-depth="3" data-path="1.7.9" class="markmap-node" transform="translate(493, -128.59375)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="615" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="597" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">② 脂肪代谢：促四肢脂肪<strong>分解</strong> + 促面/躯干脂肪<strong>合成</strong> -&gt; <strong>向心性肥胖</strong>（满月脸/水牛背）</div></div></foreignObject></g><g data-depth="3" data-path="1.7.10" class="markmap-node" transform="translate(493, -101.21875)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="525" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="507" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">③ 蛋白质：抑制肝外合成/促进分解 -&gt; 骨质疏松/皮肤变薄/抑制创伤愈合</div></div></foreignObject></g><g data-depth="3" data-path="1.7.11" class="markmap-node" transform="translate(493, -73.84375)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="280" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="262" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">④ 水盐代谢：利排水 -&gt; 缺乏-&gt;<strong>水中毒</strong></div></div></foreignObject></g><g data-depth="4" data-path="1.7.12.13" class="markmap-node" transform="translate(761, -41.46875)"><line stroke="#bcbd22" stroke-width="1.1875" x1="-1" x2="571" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="553" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">伤害性刺激（创伤/手术/感染/缺氧等）-&gt; 腺垂体释放<strong>大量ACTH</strong> -&gt; GC大量分泌</div></div></foreignObject></g><g data-depth="4" data-path="1.7.12.14" class="markmap-node" transform="translate(761, -14.28125)"><line stroke="#17becf" stroke-width="1.1875" x1="-1" x2="210" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="192" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">意义：增加<strong>耐受性和抵抗力</strong></div></div></foreignObject></g><g data-depth="4" data-path="1.7.12.15" class="markmap-node" transform="translate(761, 12.90625)"><line stroke="#1f77b4" stroke-width="1.1875" x1="-1" x2="202" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="184" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">GC 是应激反应的<strong>核心激素</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.7.12" class="markmap-node" transform="translate(493, -14.28125)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="190" y1="21.6875" y2="21.6875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="188" cy="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="172" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="