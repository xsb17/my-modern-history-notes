e stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="122" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="120" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="104" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★GC 生理作用</div></div></foreignObject></g><g data-depth="3" data-path="1.20.21" class="markmap-node" transform="translate(642, 131.65625)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="382" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="364" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">下丘脑 <strong>CRH</strong>(+) -&gt; 腺垂体 <strong>ACTH</strong>(+) -&gt; 肾上腺皮质 <strong>GC</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.20.22" class="markmap-node" transform="translate(642, 159.03125)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="310" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="292" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生物钟：CRH清晨觉醒前<strong>最高</strong> -&gt; 午夜<strong>最低</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.20.23" class="markmap-node" transform="translate(642, 186.40625)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="236" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="218" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">长反馈：GC↑ -&gt; 抑 CRH/ACTH</div></div></foreignObject></g><g data-depth="3" data-path="1.20.24" class="markmap-node" transform="translate(642, 213.78125)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="209" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x=