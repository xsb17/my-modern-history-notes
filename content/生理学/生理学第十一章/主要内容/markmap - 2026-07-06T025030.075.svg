e-width="1.75" x1="-1" x2="332" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#2ca02c" fill="var(--markmap-circle-open-bg)" cx="330" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="314" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★糖皮质激素（GC）——血浆最多为<strong>皮质醇</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.7.8" class="markmap-node" transform="translate(515, -155.96875)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="437" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="419" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">① 糖代谢：<strong>抗胰岛素样作用</strong> -&gt; <strong>升高血糖</strong>（糖尿病人慎用）   </div></div></foreignObject></g><g data-depth="3" data-path="1.7.9" class="markmap-node" transform="translate(515, -128.59375)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="625" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="607" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">② 脂肪代谢：促四肢脂肪<strong>分解</strong> + 促面/躯干脂肪<strong>合成</strong> -&gt; <strong>向心性肥胖</strong>（满月脸/水牛背）   </div></div></foreignObject></g><g data-depth="3" data-path="1.7.10" class="markmap-node" transform="translate(515, -101.21875)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="536" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="518" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">③ 蛋白质：抑制肝外合成/促进分解 -&gt; 骨质疏松/皮肤变薄/抑制创伤愈合   </div></div></foreignObject></g><g data-depth="3" data-path="1.7.11" class="markmap-node" transform="translate(515, -73.84375)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="291" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="273" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">④ 水盐代谢：利排水 -&gt; 缺乏-&gt;<strong>水中毒</strong>   </div></div></foreignObject></g><g data-depth="4" data-path="1.7.12.13" class="markmap-node" transform="translate(793, -41.46875)"><line stroke="#bcbd22" stroke-width="1.1875" x1="-1" x2="581" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="563" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">伤害性刺激（创伤/手术/感染/缺氧等）-&gt; 腺垂体释放<strong>大量ACTH</strong> -&gt; GC大量分泌   </div></div></foreignObject></g><g data-depth="4" data-path="1.7.12.14" class="markmap-node" transform="translate(793, -14.28125)"><line stroke="#17becf" stroke-width="1.1875" x1="-1" x2="221" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="203" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">意义：增加<strong>耐受性和抵抗力</strong>   </div></div></foreignObject></g><g data-depth="4" data-path="1.7.12.15" class="markmap-node" transform="translate(793, 12.90625)"><line stroke="#1f77b4" stroke-width="1.1875" x1="-1" x2="213" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="195" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">GC 是应激反应的<strong>核心激素</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.7.12" class="markmap-node" transform="translate(515, -14.28125)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="200" y1="21.6875" y2="21.6875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="198" cy="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="182" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">⑤ ★应激反应（必考）：   </div></div></foreignObject></g><g data-depth="4" data-path="1.7.16.17" class="markmap-node" transform="translate(769, 45.09375)"><line stroke="#2ca02c" stroke-width="1.1875" x1="-1" x2="399" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="381" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">血液：RBC/中性粒/PLT**↑** + 淋巴/嗜酸性粒**↓**   </div></div></foreignObject></g><g data-depth="4" data-path="1.7.16.18" class="markmap-node" transform="translate(769, 72.28125)"><line stroke="#d62728" stroke-width="1.1875" x1="-1" x2="407" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="389" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">循环：<strong>允许作用</strong>（↑心血管对儿茶酚胺/AngII反应性）   </div></div></foreignObject></g><g data-depth="4" data-path="1.7.16.19" class="markmap-node" transform="translate(769, 99.46875)"><line stroke="#9467bd" stroke-width="1.1875" x1="-1" x2="319" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="301" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">药理：<strong>抗炎/抗毒/抗过敏/抗休克</strong>（四抗）   </div></div></foreignObject></g><g data-depth="3" data-path="1.7.16" class="markmap-node" transform="translate(515, 72.28125)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="176" y1="21.6875" y2="21.6875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="174" cy="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="158" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">⑥ 对组织器官影响：   </div></div></foreignObject></g><g data-depth="2" data-path="1.7" class="markmap-node" transform="translate(304, -41.84375)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="133" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="131" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="115" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★GC 生理作用   </div></div></foreignObject></g><g data-depth="3" data-path="1.20.21" class="markmap-node" transform="translate(663, 131.65625)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="392" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="374" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">下丘脑 <strong>CRH</strong>(+) -&gt; 腺垂体 <strong>ACTH</strong>(+) -&gt; 肾上腺皮质 <strong>GC</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.20.22" class="markmap-node" transform="translate(663, 159.03125)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="321" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="303" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生物钟：CRH清晨觉醒前<strong>最高</strong> -&gt; 午夜<strong>最低</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.20.23" class="markmap-node" transform="translate(663, 186.40625)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="246" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="228" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">长反馈：GC↑ -&gt; 抑 CRH/ACTH   </div></div></foreignObject></g><g data-depth="3" data-path="1.20.24" class="markmap-node" transform="translate(663, 213.78125)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="220" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="202" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">短反馈：ACTH↑ -&gt; 抑 CRH   </div></div></foreignObject></g><g data-depth="3" data-path="1.20.25" class="markmap-node" transform="translate(663, 241.15625)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="736" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="718" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★临床重点：<strong>长期大剂量用GC -&gt; 负反馈抑ACTH -&gt; 肾上腺皮质萎缩 -&gt; 突然停药-&gt;肾上腺危象可致死</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.20.26" class="markmap-node" transform="translate(663, 268.53125)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="296" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="278" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">停药原则：<strong>逐渐减量 + 间断补充ACTH</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.20.27" class="markmap-node" transform="translate(663, 295.90625)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="419" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="401" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">应激时：CRH-ACTH-GC大量分泌，<strong>不受轴性负反馈影响</strong>   </div></div></foreignObject></g><g data-depth="2" data-path="1.20" class="markmap-node" transform="translate(304, 213.78125)"><line stroke="#8c564b" stroke-width="1.75" x1="-1" x2="281" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#8c564b" fill="var(--markmap-circle-open-bg)" cx="279" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="263" height=