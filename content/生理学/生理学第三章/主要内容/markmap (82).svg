/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">低渗溶液中 RBC 膨胀<strong>破裂</strong>的特性</div></div></foreignObject></g><g data-depth="4" data-path="1.6.13.15" class="markmap-node" transform="translate(789, 43.59375)"><line stroke="#9467bd" stroke-width="1.1875" x1="-1" x2="252" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="234" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">渗透脆性大 -&gt; 抵抗力<strong>小</strong> -&gt; 易溶血</div></div></foreignObject></g><g data-depth="4" data-path="1.6.13.16" class="markmap-node" transform="translate(789, 70.78125)"><line stroke="#8c564b" stroke-width="1.1875" x1="-1" x2="341" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="323" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">衰老RBC、<strong>遗传性球形红细胞增多症</strong> -&gt; 脆性↑</div></div></foreignObject></g><g data-depth="3" data-path="1.6.13" class="markmap-node" transform="translate(613, 43.59375)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="98" y1="21.6875" y2="21.6875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="96" cy="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="80" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">渗透脆性：</div></div></foreignObject></g><g data-depth="2" data-path="1.6" class="markmap-node" transform="translate(341, -43.0625)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="194" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="192" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="176" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★三大生理特性（必考）</div></div></f