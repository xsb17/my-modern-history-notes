.org/1999/xhtml">★三大生理特性（必考）   </div></div></foreignObject></g><g data-depth="2" data-path="1.17" class="markmap-node" transform="translate(352, 75.96875)"><line stroke="#8c564b" stroke-width="1.75" x1="-1" x2="373" y1="21.875" y2="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="355" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">红细胞功能：运输 <strong>O₂/CO₂</strong> + 缓冲 + 参与免疫清除   </div></div></foreignObject></g><g data-depth="3" data-path="1.18.19" class="markmap-node" transform="translate(715, 108.71875)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="506" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="488" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>铁/蛋白质</strong> 缺乏 -&gt; RBC 数量或 Hb↓ -&gt; <strong>缺铁性贫血</strong>（小细胞低色素）   </div></div></foreignObject></g><g data-depth="3" data-path="1.18.20" class="markmap-node" transform="translate(715, 136.09375)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="525" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="507" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>叶酸/VitB12</strong> 缺乏 -&gt; DNA 合成障碍 -&gt; RBC 巨幼变 -&gt; <strong>巨幼红细胞性贫血</strong>   </div></div></foreignObject></g><g data-depth="2" data-path="1.18" class="markmap-node" transform="translate(352, 122.40625)"><line stroke="#bcbd22" stroke-width="1.75" x1="-1" x2="285" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#bcbd22" fill="var(--markmap-circle-open-bg)" cx="283" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="267" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生成原料与贫血类型（知识库补全）   </div></div></foreignObject></g><g data-depth