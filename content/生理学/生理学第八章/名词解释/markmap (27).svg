<svg xmlns="http://www.w3.org/2000/svg" class="w-full h-full leading-none markmap mm-ki3lx0-1" style=""><style>.markmap{--markmap-max-width: 9999px;--markmap-a-color: #0097e6;--markmap-a-hover-color: #00a8ff;--markmap-code-bg: #f0f0f0;--markmap-code-color: #555;--markmap-highlight-bg: #ffeaa7;--markmap-table-border: 1px solid currentColor;--markmap-font: 300 16px/20px sans-serif;--markmap-circle-open-bg: #fff;--markmap-text-color: #333;--markmap-highlight-node-bg: #ff02;font:var(--markmap-font);color:var(--markmap-text-color)}.markmap-link{fill:none}.markmap-node&gt;circle{cursor:pointer}.markmap-foreign{display:inline-block}.markmap-foreign p{margin:0}.markmap-foreign a{color:var(--markmap-a-color)}.markmap-foreign a:hover{color:var(--markmap-a-hover-color)}.markmap-foreign code{padding:.25em;font-size:calc(1em - 2px);color:var(--markmap-code-color);background-color:var(--markmap-code-bg);border-radius:2px}.markmap-foreign pre{margin:0}.markmap-foreign pre&gt;code{display:block}.markmap-foreign del{text-decoration:line-through}.markmap-foreign em{font-style:italic}.markmap-foreign strong{font-weight:700}.markmap-foreign mark{background:var(--markmap-highlight-bg)}.markmap-foreign table,.markmap-foreign th,.markmap-foreign td{border-collapse:collapse;border:var(--markmap-table-border)}.markmap-foreign img{display:inline-block}.markmap-foreign svg{fill:currentColor}.markmap-foreign&gt;div{width:var(--markmap-max-width);text-align:left}.markmap-foreign&gt;div&gt;div{display:inline-block}.markmap-highlight rect{fill:var(--markmap-highlight-node-bg)}.markmap-dark .markmap{--markmap-code-bg: #1a1b26;--markmap-code-color: #ddd;--markmap-circle-open-bg: #444;--markmap-text-color: #eee}</style><g transform="translate(13.40668016192808,359.5848303442038) scale(0.34012628190515176)"><path class="markmap-link" data-depth="3" data-path="1.2.3" d="M340,-162.875C380,-162.875,380,-190.437,420,-190.437" stroke-width="1.375" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="3" data-path="1.2.4" d="M340,-162.875C380,-162.875,380,-163.062,420,-163.062" stroke-width="1.375" stroke="rgb(127, 127, 127)"/><path class="markmap-link" data-depth="3" data-path="1.2.5" d="M340,-162.875C380,-162.875,380,-135.687,420,-135.687" stroke-width="1.375" stroke="rgb(188, 189, 34)"/><path class="markmap-link" data-depth="3" data-path="1.6.7" d="M468,-75.75C508,-75.75,508,-103.312,548,-103.312" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="3" data-path="1.6.8" d="M468,-75.75C508,-75.75,508,-75.937,548,-75.937" stroke-width="1.375" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="3" data-path="1.6.9" d="M468,-75.75C508,-75.75,508,-48.562,548,-48.562" stroke-width="1.375" stroke="rgb(44, 160, 44)"/><path class="markmap-link" data-depth="3" data-path="1.10.11" d="M356,11.375C396,11.375,396,-16.187,436,-16.187" stroke-width="1.375" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="3" data-path="1.10.12" d="M356,11.375C396,11.375,396,11.188,436,11.188" stroke-width="1.375" stroke="rgb(140, 86, 75)"/><path class="markmap-link" data-depth="3" data-path="1.10.13" d="M356,11.375C396,11.375,396,38.563,436,38.563" stroke-width="1.375" stroke="rgb(227, 119, 194)"/><path class="markmap-link" data-depth="3" data-path="1.14.15" d="M388,98.5C428,98.5,428,70.938,468,70.938" stroke-width="1.375" stroke="rgb(188, 189, 34)"/><path class="markmap-link" data-depth="3" data-path="1.14.16" d="M388,98.5C428,98.5,428,98.313,468,98.313" stroke-width="1.375" stroke="rgb(23, 190, 207)"/><path class="markmap-link" data-depth="3" data-path="1.14.17" d="M388,98.5C428,98.5,428,125.688,468,125.688" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="3" data-path="1.18.19" d="M378,185.625C418,185.625,418,158.063,458,158.063" stroke-width="1.375" stroke="rgb(188, 189, 34)"/><path class="markmap-link" data-depth="3" data-path="1.18.20" d="M378,185.625C418,185.625,418,185.438,458,185.438" stroke-width="1.375" stroke="rgb(23, 190, 207)"/><path class="markmap-link" data-depth="3" data-path="1.18.21" d="M378,185.625C418,185.625,418,212.813,458,212.813" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="2" data-path="1.2" d="M212,11.75C252,11.75,252,-162.875,292,-162.875" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.6" d="M212,11.75C252,11.75,252,-75.75,292,-75.75" stroke-width="1.75" stroke="rgb(23, 190, 207)"/><path class="markmap-link" data-depth="2" data-path="1.10" d="M212,11.75C252,11.75,252,11.375,292,11.375" stroke-width="1.75" stroke="rgb(214, 39, 40)"/><path class="markmap-link" data-depth="2" data-path="1.14" d="M212,11.75C252,11.75,252,98.5,292,98.5" stroke-width="1.75" stroke="rgb(127, 127, 127)"/><path class="markmap-link" data-depth="2" data-path="1.18" d="M212,11.75C252,11.75,252,185.625,292,185.625" stroke-width="1.75" stroke="rgb(127, 127, 127)"/><g class="markmap-highlight"/><g data-depth="3" data-path="1.2.3" class="markmap-node" transform="translate(420, -212.125)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="722" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="704" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：机体将<strong>代谢产物</strong>、摄入的<strong>过剩物质</strong>、<strong>异物</strong>及<strong>有害物质</strong>等经<strong>血液循环</strong>由相应途径排出体外的过程</div></div></foreignObject></g><g data-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(420, -184.75)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="880" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="862" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：主要途径为<strong>肾脏</strong>（最主要排泄器官），辅助途径包括皮肤（出汗）、呼吸器官（呼出 CO₂）、消化器官（胆汁）</div></div></foreignObject></g><g data-depth="3" data-path="1.2.5" class="markmap-node" transform="translate(420, -157.375)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="1230" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1212" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：维持<strong>内环境稳态</strong>的核心环节；肾脏排泄功能丧失 → 尿毒症；注意与"排遗"区分（排泄=代谢终产物经血液循环排出，排遗=未吸收的食物残渣经消化道排出）</div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(292, -184.75)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="50" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="48" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="32" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>排泄</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.6.7" class="markmap-node" transform="translate(548, -125)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="514" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="496" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：<strong>每分钟</strong>双肾生成的<strong>超滤液量</strong>，是衡量肾小球<strong>滤过功能</strong>的定量指标</div></div></foreignObject></g><g data-depth="3" data-path="1.6.8" class="markmap-node" transform="translate(548, -97.625)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="398" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="380" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：正常成人安静时 <strong>125 ml/min</strong> = <strong>180 L/d</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.6.9" class="markmap-node" transform="translate(548, -70.25)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="1155" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1137" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：反映肾小球滤过功能的<strong>金标准</strong>；GFR↓ → 肾功能减退；是计算<strong>滤过分数</strong>的基础（FF = GFR ÷ 肾血浆流量 ≈ <strong>19%</strong>）；临床常用肌酐清除率估测 GFR</div></div></foreignObject></g><g data-depth="2" data-path="1.6" class="markmap-node" transform="translate(292, -97.625)"><line stroke="#17becf" stroke-width="1.75" x1="-1" x2="178" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#17becf" fill="var(--markmap-circle-open-bg)" cx="176" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="160" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>肾小球滤过率（GFR）</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.10.11" class="markmap-node" transform="translate(436, -37.875)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="898" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="880" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：当血糖浓度升高到一定程度，部分近端小管对葡萄糖的重吸收达到<strong>极限</strong>，<strong>尿中开始出现葡萄糖</strong>时对应的<strong>血浆葡萄糖浓度</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.10.12" class="markmap-node" transform="translate(436, -10.5)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="1060" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1042" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：<strong>180 mg/100ml</strong>；葡萄糖重吸收极限量：男 <strong>375 mg/min</strong>、女 <strong>300 mg/min</strong>；血糖达 <strong>300 mg/100ml</strong> 时尿糖排出与血糖浓度平行增加</div></div></foreignObject></g><g data-depth="3" data-path="1.10.13" class="markmap-node" transform="translate(436, 16.875)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="1127" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1109" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：反映近端小管对葡萄糖<strong>重吸收能力</strong>的界限；是理解和诊断<strong>糖尿</strong>的基础概念（血糖 &gt; 肾糖阈 → 尿糖阳性）；糖尿病诊断和疗效监测的重要参考值</div></div></foreignObject></g><g data-depth="2" data-path="1.10" class="markmap-node" transform="translate(292, -10.5)"><line stroke="#d62728" stroke-width="1.75" x1="-1" x2="66" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#d62728" fill="var(--markmap-circle-open-bg)" cx="64" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="48" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>肾糖阈</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.14.15" class="markmap-node" transform="translate(468, 49.25)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="626" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="608" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：由于<strong>小管液中溶质浓度增加</strong>、<strong>渗透压升高</strong>，使水钠重吸收<strong>减少</strong>而引起的<strong>利尿</strong>现象</div></div></foreignObject></g><g data-depth="3" data-path="1.14.16" class="markmap-node" transform="translate(468, 76.625)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="757" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="739" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：机制链：小管液溶质浓度↑ → 小管液渗透压↑ → 对抗水的重吸收 → 水重吸收↓ → <strong>尿量↑</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.14.17" class="markmap-node" transform="translate(468, 104)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="1782" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1764" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：临床典型实例 → <strong>糖尿病多尿</strong>（高血糖超肾糖阈 → 小管液葡萄糖↑ → 渗透压↑ → 多尿）；<strong>甘露醇利尿</strong>（甘露醇不被重吸收 → 滞留小管液 → 渗透压↑ → 达到脱水/降颅压/利尿目的）；渗透性利尿的溶质必须是<strong>不被或不易被重吸收</strong>的物质</div></div></foreignObject></g><g data-depth="2" data-path="1.14" class="markmap-node" transform="translate(292, 76.625)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="98" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="96" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="80" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>渗透性利尿</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.18.19" class="markmap-node" transform="translate(458, 136.375)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="775" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="757" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：近端小管中钠和水的重吸收率总是占肾小球滤过率的 <strong>65%~70%</strong> 的现象，即近端小管保持<strong>定比重吸收</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.18.20" class="markmap-node" transform="translate(458, 163.75)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="910" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="892" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：重吸收比例恒定在 <strong>65%~70%</strong>（无论 GFR 如何变化）；若 GFR 为 125 ml/min → 近端小管重吸收约 81~88 ml/min</div></div></foreignObject></g><g data-depth="3" data-path="1.18.21" class="markmap-node" transform="translate(458, 191.125)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="1384" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1366" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：保持<strong>尿量相对恒定</strong>（GFR 在一定范围内波动时尿量不致剧烈变化）；维持<strong>有效循环血量</strong>的稳定；是肾小管与肾小球功能<strong>协调配合</strong>的重要体现；破坏球管平衡 → 尿量异常增多或减少</div></div></foreignObject></g><g data-depth="2" data-path="1.18" class="markmap-node" transform="translate(292, 163.75)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="88" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="86" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="70" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>球-管平衡</strong></div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10.5)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="214" y1="22.25" y2="22.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="212" cy="22.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="196" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">第八章 课后练习题名词解释</div></div></foreignObject></g></g></svg>