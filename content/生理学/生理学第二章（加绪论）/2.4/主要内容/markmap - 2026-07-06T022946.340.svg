.125,547,137.25,587,137.25" stroke-width="1.375" stroke="rgb(23, 190, 207)"/><path class="markmap-link" data-depth="3" data-path="1.18.20" d="M507,151.125C547,151.125,547,164.625,587,164.625" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="3" data-path="1.21.22" d="M475,210.875C515,210.875,515,197,555,197" stroke-width="1.375" stroke="rgb(214, 39, 40)"/><path class="markmap-link" data-depth="3" data-path="1.21.23" d="M475,210.875C515,210.875,515,224.375,555,224.375" stroke-width="1.375" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="2" data-path="1.2" d="M336,11.75C376,11.75,376,-188.125,416,-188.125" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.6" d="M336,11.75C376,11.75,376,-87.312,416,-87.312" stroke-width="1.75" stroke="rgb(127, 127, 127)"/><path class="markmap-link" data-depth="2" data-path="1.11" d="M336,11.75C376,11.75,376,45.594,416,45.594" stroke-width="1.75" stroke="rgb(127, 127, 127)"/><path class="markmap-link" data-depth="2" data-path="1.18" d="M336,11.75C376,11.75,376,151.125,416,151.125" stroke-width="1.75" stroke="rgb(188, 189, 34)"/><path class="markmap-link" data-depth="2" data-path="1.21" d="M336,11.75C376,11.75,376,210.875,416,210.875" stroke-width="1.75" stroke="rgb(44, 160, 44)"/><g class="markmap-highlight"/><g data-depth="3" data-path="1.2.3" class="markmap-node" transform="translate(635, -237.375)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="402" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="384" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">肌节 = 相邻两 <strong>Z 线</strong>之间的区域 -&gt; 肌肉收缩的<strong>基本单位</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(635, -210)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="353" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="335" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">粗肌丝：<strong>肌球蛋白</strong>（含横桥，有 <strong>ATP 酶活性</strong>）   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.5" class="markmap-node" transform="translate(635, -182.625)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="668" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="650" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">细肌丝：<strong>肌动蛋白</strong>（横桥结合位点）+ <strong>原肌球蛋白</strong>（覆盖位点）+ <strong>肌钙蛋白</strong>（与 Ca²⁺ 结合）   </div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(416, -210)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="141" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="139" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="123" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">肌原纤维和肌节   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.7" class="markmap-node" transform="translate(667, -150.25)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="401" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="383" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">横管（T 管）：与肌原纤维<strong>垂直</strong> -&gt; 将 AP 传入细胞深处   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.8" class="markmap-node" transform="translate(667, -122.875)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="408" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="390" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">纵管（肌质网/SR）：末端膨大为<strong>终池</strong> -&gt; 含高浓度 <strong>Ca²⁺</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.9" class="markmap-node" transform="translate(667, -95.5)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="512" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="494" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★三联管（骨骼肌特有）：<strong>横管 + 两侧终池</strong> -&gt; 兴奋-收缩耦联<strong>关键部位</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.10" class="markmap-node" transform="translate(667, -68.125)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="260" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="242" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">二联管（心肌）：横管 + 单侧终池   </div></div></foreignObject></g><g data-depth="2" data-path="1.6" class="markmap-node" transform="translate(416, -109.1875)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="173" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="171" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="155" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★肌管系统（必考）   </div></div></foreignObject></g><g data-depth="3" data-path="1.11.12" class="markmap-node" transform="translate(731, -35.75)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="633" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="615" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">核心论点：肌肉收缩时<strong>肌丝本身不缩短</strong> -&gt; <strong>细肌丝</strong>向粗肌丝<strong>滑行</strong> -&gt; Z 线靠近 -&gt; 肌节变短   </div></div></foreignObject></g><g data-depth="4" data-path="1.11.13.14" class="markmap-node" transform="translate(934, -3.375)"><line stroke="#d62728" stroke-width="1.1875" x1="-1" x2="528" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="510" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">胞质 <strong>Ca²⁺↑</strong> -&gt; Ca²⁺ + <strong>肌钙蛋白</strong> -&gt; 原肌球蛋白<strong>扭转</strong> -&gt; 肌动蛋白位点<strong>暴露</strong>   </div></div></foreignObject></g><g data-depth="4" data-path="1.11.13.15" class="markmap-node" transform="translate(934, 23.8125)"><line stroke="#9467bd" stroke-width="1.1875" x1="-1" x2="488" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="470" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">-&gt; 横桥 + 肌动蛋白 -&gt; 横桥<strong>扭动</strong>（拉动细肌丝向 M 线）-&gt; 横桥<strong>复位</strong>   </div></div></foreignObject></g><g data-depth="4" data-path="1.11.13.16" class="markmap-node" transform="translate(934, 51)"><line stroke="#8c564b" stroke-width="1.1875" x1="-1" x2="370" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="352" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">-&gt; <strong>横桥周期</strong>：结合 -&gt; 扭动(ATP→ADP+Pi) -&gt; 复位   </div></div></foreignObject></g><g data-depth="3" data-path="1.11.13" class="markmap-node" transform="translate(731, 23.8125)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="125" y1="21.6875" y2="21.6875"/><circle stroke-width="1.5" r="6" stroke="#17becf" fill="var(--markmap-circle-open-bg)" cx="123" cy="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="107" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">滑行过程链：   </div></div></foreignObject></g><g data-depth="3" data-path="1.11.17" class="markmap-node" transform="translate(731, 83.1875)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="590" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="572" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">舒张过程：Ca²⁺ 被<strong>钙泵</strong>回收 -&gt; Ca²⁺ 与肌钙蛋白<strong>解离</strong> -&gt; 原肌球蛋白<strong>重新覆盖</strong>位点   </div></div></foreignObject></g><g data-depth="2" data-path="1.11" class="markmap-node" transform="translate(416, 23.71875)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="237" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="235" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="219" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★肌丝滑行理论（核心学说）   </div></div></foreignObject></g><g data-depth="3" data-path="1.18.19" class="markmap-node" transform="translate(587, 115.5625)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="220" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="202" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">张力 = 活化<strong>横桥数目</strong>的总和   </div></div></foreignObject></g><g data-depth="3" data-path="1.18.20" class="markmap-node" transform="translate(587, 142.9375)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="432" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="414" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">缩短速度 = 横桥周期越<strong>短</strong>越快（ATP 酶活性高 -&gt; 收缩快）   </div></div></foreignObject></g><g data-depth="2" data-path="1.18" class="markmap-node" transform="translate(416, 129.25)"><line stroke="#bcbd22" stroke-width="1.75" x1="-1" x2="93" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#bcbd22" fill="var(--markmap-circle-open-bg)" cx="91" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="75" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">力学表现   </div></div></foreignObject></g><g data-depth="3" data-path="1.21.22" class="markmap-node" transform="translate(555, 175.3125)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="411" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="393" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">收缩 = Ca²⁺ -&gt; 肌钙蛋白 -&gt; 原肌球扭转 -&gt; 横桥结合扭动   </div></div></foreignObject></g><g data-depth="3" data-path="1.21.23" class="markmap-node" transform="translate(555, 202.6875)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="309" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="291" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">舒张 = 钙泵回收 Ca²⁺ -&gt; 原肌球复位覆盖   </div></div></foreignObject></g><g data-depth="2" data-path="1.21" class="markmap-node" transform="translate(416, 189)"><line stroke="#2ca02c" stroke-width="1.75" x1="-1" x2="61" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#2ca02c" fill="var(--markmap-circle-open-bg)" cx="59" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="43" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">口诀   </div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10.5)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="338" y1="22.25" y2="22.25"/><circle stroke-w