 stroke="#e377c2" stroke-width="1.375" x1="-1" x2="306" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="288" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">特征：初期快、后期慢但灵敏度大幅提升</div></div></foreignObject></g><g data-depth="3" data-path="1.2.8" class="markmap-node" transform="translate(517, -175.5)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="376" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="358" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">临床：VitA缺乏 -&gt; 视紫红质合成不足 -&gt; 暗适应<strong>延长</strong></div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(357, -235.0625)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="82" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="80" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="64" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★暗适应</div></div></foreignObject></g><g data-depth="3" data-path="1.9.10" class="markmap-node" transform="translate(517, -143.125)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="343" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="325" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：从<strong>暗处进入明处</strong> -&gt; 视力迅速恢复的过程</div></div></foreignObject></g><g data-depth="3" data-path="1.9.11" class="markmap-node" transform="translate(517, -115.75)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="476" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="458" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">机制：强光下<strong>视紫红质迅速分解</strong> -&gt; 视杆暂时失活 -&gt; <strong>视锥接替工作</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.9.12" class="markmap-node" transform="translate(517, -88.375)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="348" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="330" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">特征：耗时<strong>短</strong>（约1分钟）-&gt; 初期刺眼随即恢复</div></div></foreignObject></g><g data-depth="2" data-path="1.9" class="markmap-node" transform="translate(357, -115.75)"><line stroke="#d62728" stroke-width="1.75" x1="-1" x2="82" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#d62728" fill="var(--markmap-circle-open-bg)" cx="80" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="64" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★明适应</div></div></foreignObject></g><g data-depth="3" data-path="1.13.14" class="markmap-node" transform="translate(603, -56)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="286" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="268" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">方向：暗适应=明→暗 | 明适应=暗→明</div></div></foreignObject></g><g data-depth="3" data-path="1.13.15" class="markmap-node" transform="translate(603, -28.625)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="382" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="364" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">机制：暗适应=视紫红质<strong>合成</strong> | 明适应=视紫红质<strong>分解</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.13.16" class="markmap-node" transform="translate(603, -1.25)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="355" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="337" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">耗时：暗适应=<strong>长</strong>(20-30min) | 明适应=<strong>短</strong>(~1min)</div></div></foreignObject></g><g data-depth="3" data-path="1.13.17" class="markmap-node" transform="translate(603, 26.125)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="318" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="300" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">关键：暗适应=<strong>视杆</strong>为主 | 明适应=<strong>视锥</strong>接替</div></div></foreignObject></g><g data-depth="2" data-path="1.13" class="markmap-node" transform="translate(357, -14.9375)"><line stroke="#17becf" stroke-width="1.75" x1="-1" x2="168" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#17becf" fill="var(--markmap-circle-open-bg)" cx="166" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="150" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">暗适应 vs 明适应对比</div></div></foreignObject></g><g data-depth="3" data-path="1.18.19" class="markmap-node" transform="translate(501, 58.5)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="370" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="352" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：单眼固定注视前方一点时能看到的<strong>空间范围</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.18.20" class="markmap-node" transform="translate(501, 85.875)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="346" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="328" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常大小排名：<strong>白色 &gt; 黄色/蓝色 &gt; 红色 &gt; 绿色</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.18.21" class="markmap-node" transform="translate(501, 113.25)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="401" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="383" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">原因：周边视网膜以视杆细胞为主(无色觉) -&gt; 白色最大</div></div></foreignObject></g><g data-depth="3" data-path="1.18.22" class="markmap-node" transform="translate(501, 140.625)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="399" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="381" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">临床：检查视野可辅助诊断视网膜/视神经/视通路病变</div></div></foreignObject></g><g data-depth="2" data-path="1.18" class="markmap-node" transform="translate(357, 99.5625)"><line stroke="#17becf" stroke-width="1.75" x1="-1" x2="66" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#17becf" fill="var(--markmap-circle-open-bg)" cx="64" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="48" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★视野</div></div></foreignObject></g><g data-depth="3" data-path="1.23.24" class="markmap-node" transform="translate(565, 173)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="407" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="389" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：眼对物体<strong>细微结构</strong>的分辨能力 -&gt; 最小视角的倒数</div></div></foreignObject></g><g data-depth="3" data-path="1.23.25" class="markmap-node" transform="translate(565, 200.375)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="346" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="328" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常视力 <strong>1.0</strong> = 能分辨 <strong>1分角</strong>（1/60度）的视角</div></div></foreignObject></g><g data-depth="3" data-path="1.23.26" class="markmap-node" transform="translate(565, 227.75)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="402" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="384" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">影响因素：中央凹视锥细胞密度、屈光状态、光照条件</div></div></foreignObject></g><g data-depth="3" data-path="1.23.27" class="markmap-node" transform="translate(565, 255.125)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="146" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="128" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">检查工具：<strong>视力表</strong></div></div></foreignObject></g><g data-depth="2" data-path="1.23" class="markmap-node" transform="translate(357, 214.0625)"><line stroke="#8c564b" stroke-width="1.75" x1="-1" x2="130" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#8c564b" fill="var(--markmap-circle-open-bg)" cx="128" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="112" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">视敏度（视力）</div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10.5)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="279" y1="22.25" y2="22.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="277" cy="22.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="261" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">视觉相关的生理现象 — 微型速记导图</div></div></foreignObject></g></g></svg>