y: 1;" width="304" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">一种感受器只对<strong>一种特定形式</strong>的刺激最敏感</div></div></foreignObject></g><g data-depth="3" data-path="1.5.7" class="markmap-node" transform="translate(549, -186.875)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="209" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="191" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">视觉：<strong>380~760nm</strong> 电磁波</div></div></foreignObject></g><g data-depth="3" data-path="1.5.8" class="markmap-node" transform="translate(549, -159.5)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="217" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="199" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">听觉：声波（20~20000Hz）</div></div></foreignObject></g><g data-depth="2" data-path="1.5" class="markmap-node" transform="translate(373, -186.875)"><line stroke="#2ca02c" stroke-width="1.75" x1="-1" x2="98" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#2ca02c" fill="var(--markmap-circle-open-bg)" cx="96" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="80" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★适宜刺激</div></div></foreignObject></g><g data-depth="3" data-path="1.9.10" class="markmap-node" transform="translate(613, -127.125)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="271" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="253" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">将<strong>刺激能量</strong> -&gt; 转换为传入神经的 <strong>AP</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.9.11" class="markmap-node" transform="translate(613, -99.75)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="532" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="514" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>感受器电位</strong>：感受器上产生的过渡性<strong>局部电位</strong> -&gt; 无全或无/可总和/分级式</div></div></foreignObject></g><g data-depth="3" data-path="1.9.12" class="markmap-node" transform="translate(613, -72.375)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="370" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="352" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>发生器电位</strong>：初级传入神经末梢产生的过渡性电位</div></div></foreignObject></g><g data-depth="3" data-path="1.9.13" class="markmap-node" transform="translate(613, -45)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="220" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="202" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">本质：<strong>非AP</strong> -&gt; 属于<strong>局部电位</strong></div></div></foreignObject></g><g data-depth="2" data-path="1.9" class="markmap-node" transform="translate(373, -86.0625)"><line stroke="#d62728" stroke-width="1.75" x1="-1" x2="162" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#d62728" fill="var(--markmap-circle-open-bg)" cx="160" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="144" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★换能作用（必考）</div></div></foreignObject></g><g data-depth="3" data-path="1.14.15" class="markmap-node" transform="translate(533, -12.625)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="377" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="359" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">将刺激的<strong>强度/性质/时间</strong>等信息编排成 AP 不同序列</div></div></foreignObject></g><g data-depth="3" data-path="1.14.16" class="markmap-node" transform="translate(533, 14.75)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="380" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="362" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">强度编码：刺激强 -&gt; <strong>AP频率↑</strong> + 兴奋感受器<strong>数目↑</strong></div></div></foreignObject></g><g data-depth="2" data-path="1.14" class="markmap-node" transform="translate(373, 1.0625)"><line stroke="#8c564b" stroke-width="1.75" x1="-1" x2="82" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#8c564b" fill="var(--markmap-circle-open-bg)" cx="80" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="64" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">编码作用</div></div></foreignObject></g><g data-depth="3" data-path="1.17.18" class="markmap-node" transform="translate(613, 47.125)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="346" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="328" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">恒定强度刺激持续 -&gt; AP频率<strong>逐渐降低</strong>甚至消失</div></div></foreignObject></g><g data-depth="4" data-path="1.17.19.20" class="markmap-node" transform="translate(821, 79.5)"><line stroke="#ff7f0e" stroke-width="1.1875" x1="-1" x2="403" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="385" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xh