rg/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">★散光（astigmatism）</div></div></foreignObject></g><g data-depth="3" data-path="1.17.18" class="markmap-node" transform="translate(581, 113.53125)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="269" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="251" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">近视 = 眼轴长/前聚焦 -&gt; <strong>凹透镜</strong>发散</div></div></foreignObject></g><g data-depth="3" data-path="1.17.19" class="markmap-node" transform="translate(581, 140.90625)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="269" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="251" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">远视 = 眼轴短/后聚焦 -&gt; <strong>凸透镜</strong>会聚</div></div></foreignObject></g><g data-depth="3" data-path="1.17.20" class="markmap-node" transform="translate(581, 168.28125)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="263" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="245" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">散光 = 曲率不均 -&gt; <strong>圆柱镜</strong>定向补偿</div></div></foreignObject></g><g data-depth="2" data-path="1.17" class="markmap-node" transform="translate(325, 140.90625)"><line stroke="#17becf" stroke-width="1.75" x1="-1" x2="178" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#17becf" fill="var(--markmap-circle-open-bg)" cx="176" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="160" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">三种屈光不正对比口诀</div></div></foreignObject></g><g data-depth="3" data-path="1.21.22" class="markmap-node" transform="translate(485, 200.65625)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="359" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="341" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">青少年近视 -&gt; 多为<strong>轴性近视</strong>（眼球前后径过长）</div></div></foreignObject></g><g data-depth="3" data-path="1.21.23" class="markmap-node" transform="translate(485, 228.03125)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="444" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="426" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">老年人 -&gt; 晶状体弹性↓ -&gt; <strong>老视</strong>（不同于远视，也需凸透镜）</div></div></foreignObject></g><g data-depth="2" data-path="1.21" class="markmap-node" transform="translate(325, 214.34375)"><line stroke="#d62728" stroke-width="1.75" x1="-1" x2="82" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#d62728" fill="var(--markmap-circle-open-bg)" cx="80" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="64" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">临床联系</div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10.5)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="247" y1="22.25" y2="22.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="245" cy="22.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="229" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">屈光不正与纠正 — 微型速记导图</div></div></foreignObject></g></g></svg>