<svg xmlns="http://www.w3.org/2000/svg" class="w-full h-full leading-none markmap mm-ki3lx0-1" style=""><style>.markmap{--markmap-max-width: 9999px;--markmap-a-color: #0097e6;--markmap-a-hover-color: #00a8ff;--markmap-code-bg: #f0f0f0;--markmap-code-color: #555;--markmap-highlight-bg: #ffeaa7;--markmap-table-border: 1px solid currentColor;--markmap-font: 300 16px/20px sans-serif;--markmap-circle-open-bg: #fff;--markmap-text-color: #333;--markmap-highlight-node-bg: #ff02;font:var(--markmap-font);color:var(--markmap-text-color)}.markmap-link{fill:none}.markmap-node&gt;circle{cursor:pointer}.markmap-foreign{display:inline-block}.markmap-foreign p{margin:0}.markmap-foreign a{color:var(--markmap-a-color)}.markmap-foreign a:hover{color:var(--markmap-a-hover-color)}.markmap-foreign code{padding:.25em;font-size:calc(1em - 2px);color:var(--markmap-code-color);background-color:var(--markmap-code-bg);border-radius:2px}.markmap-foreign pre{margin:0}.markmap-foreign pre&gt;code{display:block}.markmap-foreign del{text-decoration:line-through}.markmap-foreign em{font-style:italic}.markmap-foreign strong{font-weight:700}.markmap-foreign mark{background:var(--markmap-highlight-bg)}.markmap-foreign table,.markmap-foreign th,.markmap-foreign td{border-collapse:collapse;border:var(--markmap-table-border)}.markmap-foreign img{display:inline-block}.markmap-foreign svg{fill:currentColor}.markmap-foreign&gt;div{width:var(--markmap-max-width);text-align:left}.markmap-foreign&gt;div&gt;div{display:inline-block}.markmap-highlight rect{fill:var(--markmap-highlight-node-bg)}.markmap-dark .markmap{--markmap-code-bg: #1a1b26;--markmap-code-color: #ddd;--markmap-circle-open-bg: #444;--markmap-text-color: #eee}</style><g transform="translate(3.133432956830802,374.6458899643129) scale(0.32337211956702716)"><path class="markmap-link" data-depth="3" data-path="1.2.3" d="M345,-32.187C385,-32.187,385,-59.75,425,-59.75" stroke-width="1.375" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="3" data-path="1.2.4" d="M345,-32.187C385,-32.187,385,-32.375,425,-32.375" stroke-width="1.375" stroke="rgb(127, 127, 127)"/><path class="markmap-link" data-depth="3" data-path="1.2.5" d="M345,-32.187C385,-32.187,385,-5,425,-5" stroke-width="1.375" stroke="rgb(188, 189, 34)"/><path class="markmap-link" data-depth="3" data-path="1.6.7" d="M361,54.938C401,54.938,401,27.375,441,27.375" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="3" data-path="1.6.8" d="M361,54.938C401,54.938,401,54.75,441,54.75" stroke-width="1.375" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="3" data-path="1.6.9" d="M361,54.938C401,54.938,401,82.125,441,82.125" stroke-width="1.375" stroke="rgb(44, 160, 44)"/><path class="markmap-link" data-depth="2" data-path="1.2" d="M185,11.75C225,11.75,225,-32.187,265,-32.187" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.6" d="M185,11.75C225,11.75,225,54.938,265,54.938" stroke-width="1.75" stroke="rgb(23, 190, 207)"/><g class="markmap-highlight"/><g data-depth="3" data-path="1.2.3" class="markmap-node" transform="translate(425, -81.4375)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="853" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="835" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：兴奋在<strong>房室交界区</strong>传导速度<strong>最慢</strong>（仅约 0.02~0.05 m/s），使心房兴奋传递到心室出现<strong>延迟</strong>（耗时约 <strong>0.1s</strong>）的现象</div></div></foreignObject></g><g data-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(425, -54.0625)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="689" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="671" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：延搁时间约 <strong>0.1s</strong>；房室交界区为<strong>慢反应细胞</strong>，0 期由 <strong>Ca²⁺ 内流</strong>介导，去极速度慢</div></div></foreignObject></g><g data-depth="3" data-path="1.2.5" class="markmap-node" transform="translate(425, -26.6875)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="1102" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1084" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：保证<strong>心房收缩完毕后</strong>心室才开始收缩 → 心室有充分时间<strong>充盈</strong> → 防止房室<strong>同时收缩</strong> → 利于心室<strong>射血</strong>；房室交界是兴奋传入心室的<strong>唯一通路</strong></div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(265, -54.0625)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="82" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="80" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="64" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>房室延搁</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.6.7" class="markmap-node" transform="translate(441, 5.6875)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="836" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="818" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：主导整个心脏<strong>节律性兴奋</strong>的自律细胞所在部位，即<strong>窦房结 P 细胞</strong>，以窦房结为起搏点的心脏节律称为<strong>窦性节律</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.6.8" class="markmap-node" transform="translate(441, 33.0625)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="763" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="745" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：窦房结自律性<strong>最高</strong>（约 <strong>100 次/分</strong>）&gt; 房室交界（约 <strong>50 次/分</strong>）&gt; 浦肯野细胞（约 <strong>25 次/分</strong>）</div></div></foreignObject></g><g data-depth="3" data-path="1.6.9" class="markmap-node" transform="translate(441, 60.4375)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="1973" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1955" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：窦房结通过<strong>抢先占领</strong>（自律性最高 → 抢先发放冲动 → 潜在起搏点未达阈电位即被兴奋）和<strong>超速驱动压抑</strong>（快速驱动 → 压抑潜在起搏点自律性）两种机制控制其他自律组织；窦房结以外的自律组织为<strong>潜在起搏点</strong>，在病理情况下可成为<strong>异位起搏点</strong> → 产生<strong>异位节律</strong></div></div></foreignObject></g><g data-depth="2" data-path="1.6" class="markmap-node" transform="translate(265, 33.0625)"><line stroke="#17becf" stroke-width="1.75" x1="-1" x2="98" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#17becf" fill="var(--markmap-circle-open-bg)" cx="96" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="80" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>正常起搏点</strong></div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10.5)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="187" y1="22.25" y2="22.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="185" cy="22.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="169" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">4.2 课后练习题名词解释</div></div></foreignObject></g></g></svg>