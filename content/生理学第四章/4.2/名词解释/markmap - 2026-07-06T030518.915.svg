<svg xmlns="http://www.w3.org/2000/svg" class="w-full h-full leading-none markmap mm-gpvzjv-1" style=""><style>.markmap{--markmap-max-width: 9999px;--markmap-a-color: #0097e6;--markmap-a-hover-color: #00a8ff;--markmap-code-bg: #f0f0f0;--markmap-code-color: #555;--markmap-highlight-bg: #ffeaa7;--markmap-table-border: 1px solid currentColor;--markmap-font: 300 16px/20px sans-serif;--markmap-circle-open-bg: #fff;--markmap-text-color: #333;--markmap-highlight-node-bg: #ff02;font:var(--markmap-font);color:var(--markmap-text-color)}.markmap-link{fill:none}.markmap-node&gt;circle{cursor:pointer}.markmap-foreign{display:inline-block}.markmap-foreign p{margin:0}.markmap-foreign a{color:var(--markmap-a-color)}.markmap-foreign a:hover{color:var(--markmap-a-hover-color)}.markmap-foreign code{padding:.25em;font-size:calc(1em - 2px);color:var(--markmap-code-color);background-color:var(--markmap-code-bg);border-radius:2px}.markmap-foreign pre{margin:0}.markmap-foreign pre&gt;code{display:block}.markmap-foreign del{text-decoration:line-through}.markmap-foreign em{font-style:italic}.markmap-foreign strong{font-weight:700}.markmap-foreign mark{background:var(--markmap-highlight-bg)}.markmap-foreign table,.markmap-foreign th,.markmap-foreign td{border-collapse:collapse;border:var(--markmap-table-border)}.markmap-foreign img{display:inline-block}.markmap-foreign svg{fill:currentColor}.markmap-foreign&gt;div{width:var(--markmap-max-width);text-align:left}.markmap-foreign&gt;div&gt;div{display:inline-block}.markmap-highlight rect{fill:var(--markmap-highlight-node-bg)}.markmap-dark .markmap{--markmap-code-bg: #1a1b26;--markmap-code-color: #ddd;--markmap-circle-open-bg: #444;--markmap-text-color: #eee}</style><g transform="translate(22.469876232194537,323.5959960865918) scale(0.29955043594036496)"><path class="markmap-link" data-depth="3" data-path="1.2.3" d="M366,-32.187C406,-32.187,406,-59.75,446,-59.75" stroke-width="1.375" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="3" data-path="1.2.4" d="M366,-32.187C406,-32.187,406,-32.375,446,-32.375" stroke-width="1.375" stroke="rgb(140, 86, 75)"/><path class="markmap-link" data-depth="3" data-path="1.2.5" d="M366,-32.187C406,-32.187,406,-5,446,-5" stroke-width="1.375" stroke="rgb(227, 119, 194)"/><path class="markmap-link" data-depth="3" data-path="1.6.7" d="M382,54.938C422,54.938,422,27.375,462,27.375" stroke-width="1.375" stroke="rgb(188, 189, 34)"/><path class="markmap-link" data-depth="3" data-path="1.6.8" d="M382,54.938C422,54.938,422,54.75,462,54.75" stroke-width="1.375" stroke="rgb(23, 190, 207)"/><path class="markmap-link" data-depth="3" data-path="1.6.9" d="M382,54.938C422,54.938,422,82.125,462,82.125" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="2" data-path="1.2" d="M195,11.75C235,11.75,235,-32.187,275,-32.187" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.6" d="M195,11.75C235,11.75,235,54.938,275,54.938" stroke-width="1.75" stroke="rgb(127, 127, 127)"/><g class="markmap-highlight"/><g data-depth="3" data-path="1.2.3" class="markmap-node" transform="translate(446, -81.4375)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="863" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="845" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：兴奋在<strong>房室交界区</strong>传导速度<strong>最慢</strong>（仅约 0.02~0.05 m/s），使心房兴奋传递到心室出现<strong>延迟</strong>（耗时约 <strong>0.1s</strong>）的现象   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(446, -54.0625)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="699" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="681" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：延搁时间约 <strong>0.1s</strong>；房室交界区为<strong>慢反应细胞</strong>，0 期由 <strong>Ca²⁺ 内流</strong>介导，去极速度慢   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.5" class="markmap-node" transform="translate(446, -26.6875)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="1112" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1094" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：保证<strong>心房收缩完毕后</strong>心室才开始收缩 → 心室有充分时间<strong>充盈</strong> → 防止房室<strong>同时收缩</strong> → 利于心室<strong>射血</strong>；房室交界是兴奋传入心室的<strong>唯一通路</strong>   </div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(275, -54.0625)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="93" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="91" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="75" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>房室延搁</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.7" class="markmap-node" transform="translate(462, 5.6875)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="847" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="829" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：主导整个心脏<strong>节律性兴奋</strong>的自律细胞所在部位，即<strong>窦房结 P 细胞</strong>，以窦房结为起搏点的心脏节律称为<strong>窦性节律</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.8" class="markmap-node" transform="translate(462, 33.0625)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="773" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="755" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：窦房结自律性<strong>最高</strong>（约 <strong>100 次/分</strong>）&gt; 房室交界（约 <strong>50 次/分</strong>）&gt; 浦肯野细胞（约 <strong>25 次/分</strong>）   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.9" class="markmap-node" transform="translate(462, 60.4375)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="1983" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1965" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：窦房结通过<strong>抢先占领</strong>（自律性最高 → 抢先发放冲动 → 潜在起搏点未达阈电位即被兴奋）和<strong>超速驱动压抑</strong>（快速驱动 → 压抑潜在起搏点自律性）两种机制控制其他自律组织；窦房结以外的自律组织为<strong>潜在起搏点</strong>，在病理情况下可成为<strong>异位起搏点</strong> → 产生<strong>异位节律</strong>   </div></div></foreignObject></g><g data-depth="2" data-path="1.6" class="markmap-node" transform="translate(275, 33.0625)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="109" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="107" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="91" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>正常起搏点</strong>   </div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10.5)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="197" y1="22.25" y2="22.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="195" cy="22.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="179" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">4.2 课后练习题名词解释   </div></div></foreignObject></g></g></svg>