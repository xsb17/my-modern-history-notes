.28125)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="279" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="261" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">Rh 阴性：RBC 膜无 D 抗原（约 1%）</div></div></foreignObject></g><g data-depth="4" data-path="1.15.18.19" class="markmap-node" transform="translate(825, 83.65625)"><line stroke="#8c564b" stroke-width="1.1875" x1="-1" x2="441" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="423" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">第一胎：分娩时 Rh 阳性 RBC 进入母体 -&gt; 母体产生<strong>抗 D 抗体</strong></div></div></foreignObject></g><g data-depth="4" data-path="1.15.18.20" class="markmap-node" transform="translate(825, 110.84375)"><line stroke="#e377c2" stroke-width="1.1875" x1="-1" x2="592" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="574" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">第二胎（又是 Rh 阳性）：抗 D 抗体 IgG 通过胎盘 -&gt; 攻击胎儿 RBC -&gt; <strong>新生儿溶血病</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.15.18" class="markmap-node" transform="translate(524, 97.25)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="223" y1="21.6875" y2="21.6875"/><circle stroke-width="1.5" r="6" stroke="#9467bd" fill="var(--markmap-circle-open-bg)" cx="221" cy="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="205" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">Rh 阴性母亲 + Rh 阳性胎儿：</div></div></foreignObject></g><g data-depth="3" data-path="1.15.21" class="markmap-node" transform="translate(524, 143.03125)"><line stroke="#7f7f7f" stroke-width="1.375" x1="-1" x2="410" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-f