<svg xmlns="http://www.w3.org/2000/svg" class="w-full h-full leading-none markmap mm-gpvzjv-1" style=""><style>.markmap{--markmap-max-width: 9999px;--markmap-a-color: #0097e6;--markmap-a-hover-color: #00a8ff;--markmap-code-bg: #f0f0f0;--markmap-code-color: #555;--markmap-highlight-bg: #ffeaa7;--markmap-table-border: 1px solid currentColor;--markmap-font: 300 16px/20px sans-serif;--markmap-circle-open-bg: #fff;--markmap-text-color: #333;--markmap-highlight-node-bg: #ff02;font:var(--markmap-font);color:var(--markmap-text-color)}.markmap-link{fill:none}.markmap-node&gt;circle{cursor:pointer}.markmap-foreign{display:inline-block}.markmap-foreign p{margin:0}.markmap-foreign a{color:var(--markmap-a-color)}.markmap-foreign a:hover{color:var(--markmap-a-hover-color)}.markmap-foreign code{padding:.25em;font-size:calc(1em - 2px);color:var(--markmap-code-color);background-color:var(--markmap-code-bg);border-radius:2px}.markmap-foreign pre{margin:0}.markmap-foreign pre&gt;code{display:block}.markmap-foreign del{text-decoration:line-through}.markmap-foreign em{font-style:italic}.markmap-foreign strong{font-weight:700}.markmap-foreign mark{background:var(--markmap-highlight-bg)}.markmap-foreign table,.markmap-foreign th,.markmap-foreign td{border-collapse:collapse;border:var(--markmap-table-border)}.markmap-foreign img{display:inline-block}.markmap-foreign svg{fill:currentColor}.markmap-foreign&gt;div{width:var(--markmap-max-width);text-align:left}.markmap-foreign&gt;div&gt;div{display:inline-block}.markmap-highlight rect{fill:var(--markmap-highlight-node-bg)}.markmap-dark .markmap{--markmap-code-bg: #1a1b26;--markmap-code-color: #ddd;--markmap-circle-open-bg: #444;--markmap-text-color: #eee}</style><g transform="translate(28.865559855499953,322.48317485826897) scale(0.2897480462106342)"><path class="markmap-link" data-depth="3" data-path="1.2.3" d="M393,-163.375C433,-163.375,433,-191.937,473,-191.937" stroke-width="1.375" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="3" data-path="1.2.4" d="M393,-163.375C433,-163.375,433,-162.562,473,-162.562" stroke-width="1.375" stroke="rgb(140, 86, 75)"/><path class="markmap-link" data-depth="3" data-path="1.2.5" d="M393,-163.375C433,-163.375,433,-135.187,473,-135.187" stroke-width="1.375" stroke="rgb(227, 119, 194)"/><path class="markmap-link" data-depth="3" data-path="1.6.7" d="M383,-75.25C423,-75.25,423,-102.812,463,-102.812" stroke-width="1.375" stroke="rgb(188, 189, 34)"/><path class="markmap-link" data-depth="3" data-path="1.6.8" d="M383,-75.25C423,-75.25,423,-75.437,463,-75.437" stroke-width="1.375" stroke="rgb(23, 190, 207)"/><path class="markmap-link" data-depth="3" data-path="1.6.9" d="M383,-75.25C423,-75.25,423,-48.062,463,-48.062" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="3" data-path="1.10.11" d="M409,11.875C449,11.875,449,-15.687,489,-15.687" stroke-width="1.375" stroke="rgb(44, 160, 44)"/><path class="markmap-link" data-depth="3" data-path="1.10.12" d="M409,11.875C449,11.875,449,11.688,489,11.688" stroke-width="1.375" stroke="rgb(214, 39, 40)"/><path class="markmap-link" data-depth="3" data-path="1.10.13" d="M409,11.875C449,11.875,449,39.063,489,39.063" stroke-width="1.375" stroke="rgb(148, 103, 189)"/><path class="markmap-link" data-depth="3" data-path="1.14.15" d="M393,99C433,99,433,71.438,473,71.438" stroke-width="1.375" stroke="rgb(188, 189, 34)"/><path class="markmap-link" data-depth="3" data-path="1.14.16" d="M393,99C433,99,433,98.813,473,98.813" stroke-width="1.375" stroke="rgb(23, 190, 207)"/><path class="markmap-link" data-depth="3" data-path="1.14.17" d="M393,99C433,99,433,126.188,473,126.188" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="3" data-path="1.18.19" d="M447,186.125C487,186.125,487,158.563,527,158.563" stroke-width="1.375" stroke="rgb(23, 190, 207)"/><path class="markmap-link" data-depth="3" data-path="1.18.20" d="M447,186.125C487,186.125,487,185.938,527,185.938" stroke-width="1.375" stroke="rgb(31, 119, 180)"/><path class="markmap-link" data-depth="3" data-path="1.18.21" d="M447,186.125C487,186.125,487,213.313,527,213.313" stroke-width="1.375" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.2" d="M222,11.75C262,11.75,262,-163.375,302,-163.375" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.6" d="M222,11.75C262,11.75,262,-75.25,302,-75.25" stroke-width="1.75" stroke="rgb(127, 127, 127)"/><path class="markmap-link" data-depth="2" data-path="1.10" d="M222,11.75C262,11.75,262,11.875,302,11.875" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.14" d="M222,11.75C262,11.75,262,99,302,99" stroke-width="1.75" stroke="rgb(127, 127, 127)"/><path class="markmap-link" data-depth="2" data-path="1.18" d="M222,11.75C262,11.75,262,186.125,302,186.125" stroke-width="1.75" stroke="rgb(188, 189, 34)"/><g class="markmap-highlight"/><g data-depth="3" data-path="1.2.3" class="markmap-node" transform="translate(473, -213.625)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="733" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="715" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：消化道平滑肌<strong>自发</strong>的、<strong>周期性</strong>产生的缓慢、轻度的<strong>去极化和复极化</strong>电位波动，又称<strong>基本电节律</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.4" class="markmap-node" transform="translate(473, -186.25)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="1398" y1="23.6875" y2="23.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1380" height="23"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：由 <strong>Cajal 间质细胞（ICC）<strong>产生 → ICC 是胃肠运动的</strong>起搏细胞</strong>；频率决定收缩节律 → 胃 <strong>3 次/min</strong>、十二指肠 <strong>11~12 次/min</strong>；幅度 **10<sub>15mV**、时程数秒</sub>十几秒；静息电位 <strong>-50~-60mV</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.2.5" class="markmap-node" transform="translate(473, -156.875)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="1375" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1357" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：慢波本身不引起收缩，但为动作电位提供<strong>基础</strong>；慢波 → 达<strong>机械阈</strong> → 平滑肌轻微收缩；慢波 → 达<strong>电阈</strong> → 触发 <strong>AP</strong> → 平滑肌明显收缩；慢波频率决定了消化道平滑肌的<strong>收缩节律</strong>   </div></div></foreignObject></g><g data-depth="2" data-path="1.2" class="markmap-node" transform="translate(302, -185.25)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="93" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="91" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="75" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>慢波电位</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.7" class="markmap-node" transform="translate(463, -124.5)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="603" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="585" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：既存在于<strong>中枢神经系统</strong>（CNS）又存在于<strong>胃肠道</strong>内，呈<strong>双重分布</strong>的<strong>肽类物质</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.8" class="markmap-node" transform="translate(463, -97.125)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="990" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="972" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：胃肠道内分泌细胞超过 <strong>40 种</strong>（APUD 细胞）；典型代表 → <strong>促胃液素、缩胆囊素、促胰液素、抑胃肽、胃动素</strong>等均为脑-肠肽   </div></div></foreignObject></g><g data-depth="3" data-path="1.6.9" class="markmap-node" transform="translate(463, -69.75)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="1561" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1543" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：体现了<strong>神经系统与消化系统</strong>之间在分子水平上的<strong>密切联系</strong>；同一肽类物质在中枢和外周可发挥<strong>不同</strong>的生理功能；是理解<strong>脑-肠轴</strong>概念的物质基础；对研究功能性胃肠病（如肠易激综合征）有重要临床意义   </div></div></foreignObject></g><g data-depth="2" data-path="1.6" class="markmap-node" transform="translate(302, -97.125)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="83" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="81" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="65" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>脑-肠肽</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.10.11" class="markmap-node" transform="translate(489, -37.375)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="909" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="891" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：食物刺激<strong>口腔、咽、食管</strong>等多处感受器，<strong>反射性</strong>地引起<strong>胃底和胃体</strong>肌肉<strong>舒张</strong>、胃容积<strong>扩大</strong>的运动形式，是<strong>胃特有</strong>的运动   </div></div></foreignObject></g><g data-depth="3" data-path="1.10.12" class="markmap-node" transform="translate(489, -10)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="993" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="975" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：胃容积可由 <strong>50ml 扩大至 1.5L</strong>；机制 → 迷走神经释放**肽类物质（VIP，血管活性肠肽）**引起；区别于紧张性收缩和蠕动   </div></div></foreignObject></g><g data-depth="3" data-path="1.10.13" class="markmap-node" transform="translate(489, 17.375)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="1345" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1327" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：<strong>容纳</strong>摄入的大量食物而<strong>胃内压不显著升高</strong> → 防止食物过快进入十二指肠；为胃内消化提供<strong>空间</strong>储备；是实现胃<strong>储存</strong>功能的关键运动形式；切断迷走神经 → 容受性舒张<strong>消失</strong>   </div></div></foreignObject></g><g data-depth="2" data-path="1.10" class="markmap-node" transform="translate(302, -10)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="109" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="var(--markmap-circle-open-bg)" cx="107" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="91" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>容受性舒张</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.15" class="markmap-node" transform="translate(473, 49.75)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="637" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="619" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：以肠壁<strong>环形肌</strong>为主的<strong>节律性收缩和舒张</strong>交替进行的运动形式，是<strong>小肠特有</strong>的运动   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.16" class="markmap-node" transform="translate(473, 77.125)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="848" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="830" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：环形肌在食糜所在部位交替收缩/舒张 → 将食糜分成许多小节段、随后重新组合；频率由慢波节律决定   </div></div></foreignObject></g><g data-depth="3" data-path="1.14.17" class="markmap-node" transform="translate(473, 104.5)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="1361" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1343" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：<strong>搅拌</strong>食糜 → 促进<strong>化学性消化</strong>（食糜与消化液充分混合）；使食糜与肠壁<strong>反复接触</strong> → 促进<strong>吸收</strong>；不主要起推进作用（推进由蠕动完成）；是理解小肠消化吸收<strong>高效性</strong>的运动基础   </div></div></foreignObject></g><g data-depth="2" data-path="1.14" class="markmap-node" transform="translate(302, 77.125)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="93" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="91" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="75" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>分节运动</strong>   </div></div></foreignObject></g><g data-depth="3" data-path="1.18.19" class="markmap-node" transform="translate(527, 136.875)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="813" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="795" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">定义：胆汁中的<strong>胆盐</strong>在<strong>回肠</strong>被重吸收、经<strong>门静脉</strong>回到肝脏、被肝细胞重新摄取并再次分泌入胆汁的<strong>循环利用</strong>过程   </div></div></foreignObject></g><g data-depth="3" data-path="1.18.20" class="markmap-node" transform="translate(527, 164.25)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="1068" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1050" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">正常值/公式：约 <strong>95%</strong> 的胆盐在<strong>回肠</strong>被重吸收 → 经<strong>门静脉</strong>回肝脏 → 每日循环 <strong>6~12 次</strong>；每次循环约有 5% 的胆盐随粪便排出 → 肝脏需不断合成补充   </div></div></foreignObject></g><g data-depth="3" data-path="1.18.21" class="markmap-node" transform="translate(527, 191.625)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="2043" y1="21.6875" y2="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="2025" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">生理意义/特征：<strong>节约胆盐</strong> → 有限的胆盐池（约 <strong>3~5g</strong>）通过循环满足每日乳化脂肪的<strong>大量需求</strong>（每日分泌胆盐约 <strong>12~24g</strong>）；维持胆汁的<strong>持续分泌</strong>；肠-肝循环<strong>中断</strong>（如回肠切除）→ 胆盐大量流失 → 脂肪<strong>消化吸收障碍</strong> → 脂肪泻；口服<strong>考来烯胺</strong>（胆盐螯合剂）可阻断肠-肝循环 → 降胆固醇   </div></div></foreignObject></g><g data-depth="2" data-path="1.18" class="markmap-node" transform="translate(302, 164.25)"><line stroke="#bcbd22" stroke-width="1.75" x1="-1" x2="147" y1="21.875" y2="21.875"/><circle stroke-width="1.5" r="6" stroke="#bcbd22" fill="var(--markmap-circle-open-bg)" cx="145" cy="21.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="129" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><strong>胆盐的肠-肝循环</strong>   </div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10.5)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="224" y1="22.25" y2="22.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="222" cy="22.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="206" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">第六章 课后练习题名词解释   </div></div></foreignObject></g></g></svg>