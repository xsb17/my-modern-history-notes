"0" style="opacity: 1;" width="473" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">食物刺激口腔/咽/食管 -&gt; 反射性胃底/胃体<strong>舒张</strong> -&gt; 容积 <strong>50ml→1.5L</strong></div></div></foreignObject></g><g data-depth="4" data-path="1.2.3.5" class="markmap-node" transform="translate(885, -231.5703125)"><line stroke="#9467bd" stroke-width="1.1875" x1="-1" x2="258" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="240" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">意义：<strong>容纳食物</strong> + 维持胃内压<strong>不变</strong></div></div></foreignObject></g><g data-depth="4" data-path="1.2.3.6" class="markmap-node" transform="translate(885, -204.3828125)"><line stroke="#8c564b" stroke-width="1.1875" x1="-1" x2="284" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="266" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">机制：迷走神经释放<strong>肽类物质（VIP）</strong></div></div></foreignObject></g><g data-depth="3" data-path="1.2.3" class="markmap-node" transform="translate(565, -231.5703125)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="242" y1="21.6875" y2="21.6875"/><circle stroke-width="1.5" r="6" stroke="#9467bd" fill="var(--markmap-circle-open-bg)" cx="240" cy="21.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="224" height="21"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">容受性舒张（<strong>胃特有</strong>）★必考：</div></div></foreignObject></g><g data-depth="4" data-path="1.2.7.8" class="markmap-node" transform="translate(813, -172.1953125)"><line stroke="#7f7f7f" stroke-width="1.1875" x1="-1" x2="162" y1="21.59375" y2="21.59375"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="144" height="21"><div xmlns="http://www.w3.org/1999/xhtml"